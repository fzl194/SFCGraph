<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>业务感知三层图谱可视化</title>
<script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<script type="text/javascript" src="viz_data_embed.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-overlay: rgba(22, 27, 34, 0.92);
  --border-color: #30363d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #6e7681;
  --accent: #58a6ff;
  --accent-hover: #79c0ff;
}

body {
  font-family: -apple-system, 'Microsoft YaHei', 'Segoe UI', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ===== Top Bar ===== */
#topBar {
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border-color);
  padding: 12px 20px;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#topBar .header {
  display: flex;
  align-items: baseline;
  gap: 16px;
}

#topBar h1 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.5px;
}

#topBar .subtitle {
  font-size: 12px;
  color: var(--text-muted);
}

#viewButtons {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

#viewButtons button {
  background: var(--bg-primary);
  color: var(--text-secondary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 5px 12px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s ease;
  font-family: inherit;
}

#viewButtons button:hover {
  color: var(--text-primary);
  border-color: var(--accent);
  background: rgba(88, 166, 255, 0.08);
}

#viewButtons button.active {
  color: #fff;
  background: rgba(88, 166, 255, 0.18);
  border-color: var(--accent);
  font-weight: 500;
}

/* ===== Main Layout ===== */
#mainLayout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ===== Sidebar ===== */
#sidebar {
  width: 280px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border-color);
  overflow-y: auto;
  flex-shrink: 0;
  padding: 12px;
}

#sidebar::-webkit-scrollbar { width: 5px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

#sidebar h3 {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin: 12px 0 6px;
  padding-bottom: 4px;
  border-bottom: 1px solid var(--border-color);
}

#sidebar h3:first-child { margin-top: 0; }

.filter-section { margin-bottom: 4px; }

.filter-section label {
  display: flex;
  align-items: center;
  font-size: 12px;
  cursor: pointer;
  padding: 3px 4px;
  border-radius: 4px;
  transition: background 0.1s;
}

.filter-section label:hover { background: rgba(255,255,255,0.04); }

.filter-section input[type="checkbox"] {
  margin-right: 6px;
  accent-color: var(--accent);
  width: 14px;
  height: 14px;
  flex-shrink: 0;
}

.filter-section input:checked + .dot + span { color: var(--text-primary); }
.filter-section input:not(:checked) + .dot + span { color: var(--text-muted); }

.dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-right: 6px;
  flex-shrink: 0;
}

.edge-line {
  display: inline-block;
  width: 20px;
  height: 0;
  border-top: 2px solid;
  margin-right: 6px;
  flex-shrink: 0;
}

.edge-line.dashed { border-top-style: dashed; }

/* ===== Graph Container ===== */
#graphContainer {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#graph { width: 100%; height: 100%; }

/* ===== Detail Panel ===== */
#detail {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 320px;
  max-height: 70vh;
  background: var(--bg-overlay);
  border: 1px solid var(--border-color);
  border-radius: 10px;
  padding: 16px;
  overflow-y: auto;
  display: none;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  z-index: 10;
}

#detail::-webkit-scrollbar { width: 4px; }
#detail::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

#detail .detail-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 12px;
}

#detail h3 {
  font-size: 14px;
  color: var(--accent);
  font-weight: 600;
  flex: 1;
  padding-right: 8px;
}

#detail .close-btn {
  cursor: pointer;
  color: var(--text-muted);
  font-size: 18px;
  line-height: 1;
  flex-shrink: 0;
  transition: color 0.15s;
}

#detail .close-btn:hover { color: var(--text-primary); }

#detail .field {
  margin-bottom: 8px;
  font-size: 12px;
  line-height: 1.5;
}

#detail .field .key {
  color: var(--text-muted);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  display: block;
  margin-bottom: 2px;
}

#detail .field .val {
  color: var(--text-primary);
}

#detail .field .group-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}

#detail .conn-section {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--border-color);
}

#detail .conn-title {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

#detail .conn-item {
  font-size: 11px;
  padding: 3px 0;
  color: var(--text-secondary);
  line-height: 1.4;
}

#detail .conn-item .arrow { color: var(--text-muted); }

/* ===== Stats Bar ===== */
#stats {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: var(--bg-overlay);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 6px 14px;
  font-size: 12px;
  backdrop-filter: blur(8px);
  z-index: 5;
}

#stats span { color: var(--accent); font-weight: 600; }

/* ===== Legend ===== */
#legend {
  position: absolute;
  bottom: 12px;
  right: 12px;
  background: var(--bg-overlay);
  border: 1px solid var(--border-color);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 11px;
  backdrop-filter: blur(8px);
  z-index: 5;
  max-height: 280px;
  overflow-y: auto;
}

#legend::-webkit-scrollbar { width: 3px; }
#legend::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 2px; }

.legend-title {
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 4px;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.legend-item {
  display: flex;
  align-items: center;
  padding: 2px 0;
  color: var(--text-secondary);
}

/* ===== Loading ===== */
#loading {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: var(--text-muted);
  font-size: 14px;
  z-index: 20;
}

.spinner {
  width: 32px;
  height: 32px;
  border: 3px solid var(--border-color);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Search ===== */
#searchBox {
  width: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  border: 1px solid var(--border-color);
  border-radius: 6px;
  padding: 6px 10px;
  font-size: 12px;
  margin-bottom: 8px;
  font-family: inherit;
  outline: none;
  transition: border-color 0.15s;
}

#searchBox::placeholder { color: var(--text-muted); }
#searchBox:focus { border-color: var(--accent); }
</style>
</head>
<body>

<!-- Top Bar -->
<div id="topBar">
  <div class="header">
    <h1>业务感知三层图谱可视化</h1>
    <span class="subtitle">114 nodes, 251 edges (from 40 CSV files across 11 sub-directories)</span>
  </div>
  <div id="viewButtons">
    <button class="active" onclick="applyView('full')">全量图谱</button>
    <button onclick="applyView('business')">业务层</button>
    <button onclick="applyView('semantic')">语义桥接</button>
    <button onclick="applyView('feature')">特性映射</button>
    <button onclick="applyView('config')">配置落地</button>
    <button onclick="applyView('engineering')">工程闭环</button>
    <button onclick="applyView('ds1')">DS-BA-001 计费主线</button>
    <button onclick="applyView('ds2')">DS-BA-002 配额重定向</button>
    <button onclick="applyView('evidence')">证据溯源</button>
  </div>
</div>

<!-- Main Layout -->
<div id="mainLayout">
  <!-- Sidebar -->
  <div id="sidebar">
    <input type="text" id="searchBox" placeholder="搜索节点 ID 或标签..." oninput="handleSearch(this.value)">
    <h3>节点类型</h3>
    <div class="filter-section" id="nodeFilters"></div>
    <h3>关系类型</h3>
    <div class="filter-section" id="edgeFilters"></div>
  </div>

  <!-- Graph -->
  <div id="graphContainer">
    <div id="graph"></div>
    <div id="loading">
      <div class="spinner"></div>
      正在加载数据...
    </div>
    <div id="detail">
      <div class="detail-header">
        <h3 id="detailTitle"></h3>
        <span class="close-btn" onclick="closeDetail()">&times;</span>
      </div>
      <div id="detailContent"></div>
    </div>
    <div id="stats"></div>
    <div id="legend"></div>
  </div>
</div>

<script>
// ============================================================
// CONFIGURATION
// ============================================================

const NODE_COLORS = {
  BusinessDomain:       '#e74c3c',
  NetworkScenario:      '#e67e22',
  ReferencePattern:     '#f39c12',
  DeliverySolution:     '#2ecc71',
  EngineeringTask:      '#1abc9c',
  DomainSemanticObject: '#3498db',
  Capability:           '#9b59b6',
  Feature:              '#8e44ad',
  ConfigObject:         '#2980b9',
  RuntimeFlow:          '#e91e63',
  ValidationPlan:       '#00bcd4',
  DiagnosisRule:        '#ff9800',
  RiskConstraint:       '#f44336',
  Evidence:             '#607d8b',
};

const NODE_LABELS = {
  BusinessDomain:       '业务域',
  NetworkScenario:      '网络场景',
  ReferencePattern:     '参考范式',
  DeliverySolution:     '交付方案',
  EngineeringTask:      '工程任务',
  DomainSemanticObject: '语义对象',
  Capability:           '能力',
  Feature:              '特性',
  ConfigObject:         '配置对象',
  RuntimeFlow:          '运行流程',
  ValidationPlan:       '验收方案',
  DiagnosisRule:        '诊断规则',
  RiskConstraint:       '风险约束',
  Evidence:             '证据',
};

const NODE_SIZES = {
  BusinessDomain:       32,
  NetworkScenario:      24,
  ReferencePattern:     20,
  DeliverySolution:     26,
  EngineeringTask:      18,
  DomainSemanticObject: 22,
  Capability:           20,
  Feature:              20,
  ConfigObject:         16,
  RuntimeFlow:          20,
  ValidationPlan:       18,
  DiagnosisRule:        18,
  RiskConstraint:       18,
  Evidence:             14,
};

const EDGE_LABELS = {
  contains:                      '包含',
  has_pattern:                   '参考范式',
  instantiated_as:               '实例化为',
  decomposes_to:                 '分解为',
  uses_semantic_object:          '使用语义',
  instantiates_semantic_object:  '实例化语义',
  semantic_requires_capability:  '语义需能力',
  semantic_realized_by_config:   '语义→配置',
  semantic_verified_by:          '语义验收',
  implemented_by_feature:        '由特性实现',
  requires_capability:           '需要能力',
  realized_by_config:            '由配置实现',
  has_runtime_flow:              '运行流程',
  validated_by:                  '验收方案',
  diagnosed_by:                  '诊断规则',
  constrained_by:                '风险约束',
  supported_by:                  '证据支撑',
};

const EDGE_COLORS = {
  contains:                      '#5a4fcf',
  has_pattern:                   '#d4a017',
  instantiated_as:               '#2ecc71',
  decomposes_to:                 '#1abc9c',
  uses_semantic_object:          '#3498db',
  instantiates_semantic_object:  '#2c7fbe',
  semantic_requires_capability:  '#9b59b6',
  semantic_realized_by_config:   '#2980b9',
  semantic_verified_by:          '#607d8b',
  implemented_by_feature:        '#8e44ad',
  requires_capability:           '#c084fc',
  realized_by_config:            '#1e7a9c',
  has_runtime_flow:              '#e91e63',
  validated_by:                  '#00bcd4',
  diagnosed_by:                  '#ff9800',
  constrained_by:                '#f44336',
  supported_by:                  '#78909c',
};

const DASHED_EDGES = new Set([
  'uses_semantic_object',
  'instantiates_semantic_object',
  'semantic_requires_capability',
  'semantic_realized_by_config',
  'semantic_verified_by',
  'supported_by',
]);

const NO_ARROW_EDGES = new Set(['supported_by']);

// ============================================================
// VIEW DEFINITIONS
// ============================================================

const VIEWS = {
  full: {
    title: '全量图谱',
    nodeGroups: null,
    edgeTypes: null,
  },
  business: {
    title: '业务层',
    nodeGroups: ['BusinessDomain', 'NetworkScenario', 'ReferencePattern', 'DeliverySolution', 'EngineeringTask'],
    edgeTypes: ['contains', 'has_pattern', 'instantiated_as', 'decomposes_to'],
  },
  semantic: {
    title: '语义桥接',
    nodeGroups: ['NetworkScenario', 'DeliverySolution', 'DomainSemanticObject'],
    edgeTypes: ['uses_semantic_object', 'instantiates_semantic_object'],
  },
  feature: {
    title: '特性映射',
    nodeGroups: ['DomainSemanticObject', 'Capability', 'Feature'],
    edgeTypes: ['semantic_requires_capability', 'implemented_by_feature'],
  },
  config: {
    title: '配置落地',
    nodeGroups: ['DomainSemanticObject', 'ConfigObject'],
    edgeTypes: ['semantic_realized_by_config', 'realized_by_config'],
  },
  engineering: {
    title: '工程闭环',
    nodeGroups: ['DeliverySolution', 'RuntimeFlow', 'ValidationPlan', 'DiagnosisRule', 'RiskConstraint'],
    edgeTypes: ['has_runtime_flow', 'validated_by', 'diagnosed_by', 'constrained_by'],
  },
  ds1: {
    title: 'DS-BA-001 计费主线',
    focusNode: 'DS-BA-001',
    hops: 2,
  },
  ds2: {
    title: 'DS-BA-002 配额重定向',
    focusNode: 'DS-BA-002',
    hops: 2,
  },
  evidence: {
    title: '证据溯源',
    nodeGroups: ['Evidence'],
    edgeTypes: ['supported_by'],
    includeTargets: true,
  },
};

// ============================================================
// STATE
// ============================================================

let rawData = null;
let network = null;
let currentView = 'full';

// ============================================================
// HELPERS
// ============================================================

function lightenColor(hex, amount) {
  const num = parseInt(hex.replace('#', ''), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0x00FF) + amount);
  const b = Math.min(255, (num & 0x0000FF) + amount);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

function getNodeById(id) {
  return rawData.nodes.find(n => n.id === id);
}

function getAdjacencyMap() {
  const adj = {};
  rawData.edges.forEach(e => {
    if (!adj[e.from]) adj[e.from] = [];
    if (!adj[e.to]) adj[e.to] = [];
    adj[e.from].push({ nodeId: e.to, edge: e });
    adj[e.to].push({ nodeId: e.from, edge: e });
  });
  return adj;
}

function getNeighbors(nodeId, hops) {
  const adj = getAdjacencyMap();
  const visited = new Set([nodeId]);
  const frontier = [nodeId];
  const resultNodes = new Set([nodeId]);
  const resultEdges = new Set();

  for (let h = 0; h < hops; h++) {
    const next = [];
    for (const nid of frontier) {
      const neighbors = adj[nid] || [];
      for (const { nodeId, edge } of neighbors) {
        resultEdges.add(edge);
        if (!visited.has(nodeId)) {
          visited.add(nodeId);
          resultNodes.add(nodeId);
          next.push(nodeId);
        }
      }
    }
    frontier.length = 0;
    frontier.push(...next);
  }

  return { nodes: resultNodes, edges: resultEdges };
}

// ============================================================
// DATA LOADING
// ============================================================

async function loadData() {
  try {
    rawData = EMBEDDED_DATA;
    document.getElementById('loading').style.display = 'none';
    initApp();
  } catch (err) {
    document.getElementById('loading').innerHTML =
      '<div style="color:#f44336;font-size:14px;">加载失败: ' + err.message + '</div>';
  }
}

// ============================================================
// APP INITIALIZATION
// ============================================================

function initApp() {
  buildFilterUI();
  applyView('full');
}

function buildFilterUI() {
  const nf = document.getElementById('nodeFilters');
  const ef = document.getElementById('edgeFilters');

  // Count nodes per group
  const nodeCounts = {};
  rawData.nodes.forEach(n => {
    nodeCounts[n.group] = (nodeCounts[n.group] || 0) + 1;
  });

  // Node filters
  Object.keys(NODE_LABELS).forEach(group => {
    const count = nodeCounts[group] || 0;
    const color = NODE_COLORS[group];
    const label = NODE_LABELS[group];
    const el = document.createElement('label');
    el.innerHTML =
      '<input type="checkbox" checked data-ng="' + group + '" onchange="onFilterChange()">' +
      '<span class="dot" style="background:' + color + '"></span>' +
      '<span>' + label + ' (' + count + ')</span>';
    nf.appendChild(el);
  });

  // Count edges per group
  const edgeCounts = {};
  rawData.edges.forEach(e => {
    edgeCounts[e.group] = (edgeCounts[e.group] || 0) + 1;
  });

  // Edge filters
  Object.keys(EDGE_LABELS).forEach(group => {
    const count = edgeCounts[group] || 0;
    if (count === 0) return;
    const color = EDGE_COLORS[group];
    const label = EDGE_LABELS[group];
    const dashed = DASHED_EDGES.has(group);
    const el = document.createElement('label');
    el.innerHTML =
      '<input type="checkbox" checked data-et="' + group + '" onchange="onFilterChange()">' +
      '<span class="edge-line' + (dashed ? ' dashed' : '') + '" style="border-color:' + color + '"></span>' +
      '<span>' + label + ' (' + count + ')</span>';
    ef.appendChild(el);
  });
}

// ============================================================
// VIEW APPLICATION
// ============================================================

function applyView(viewId) {
  currentView = viewId;
  const view = VIEWS[viewId];
  if (!view) return;

  // Update active button
  document.querySelectorAll('#viewButtons button').forEach(btn => {
    btn.classList.remove('active');
  });
  const btns = document.querySelectorAll('#viewButtons button');
  btns.forEach(btn => {
    if (btn.onclick && btn.getAttribute('onclick').includes("'" + viewId + "'")) {
      btn.classList.add('active');
    }
  });

  // Handle focus node views (DS-001, DS-002)
  if (view.focusNode) {
    const neighborhood = getNeighbors(view.focusNode, view.hops);
    const filteredNodes = rawData.nodes.filter(n => neighborhood.nodes.has(n.id));
    const filteredEdges = rawData.edges.filter(e => neighborhood.edges.has(e));

    // Update checkboxes
    setAllCheckboxes(false);
    const activeGroups = new Set(filteredNodes.map(n => n.group));
    const activeEdgeTypes = new Set(filteredEdges.map(e => e.group));
    activeGroups.forEach(g => setNodeCheckbox(g, true));
    activeEdgeTypes.forEach(t => setEdgeCheckbox(t, true));

    renderGraph(filteredNodes, filteredEdges, view.focusNode);
    return;
  }

  // Handle evidence view
  if (view.includeTargets) {
    const activeNodeGroups = new Set(view.nodeGroups);
    const activeEdgeTypes = new Set(view.edgeTypes);

    // Find all nodes connected to evidence via supported_by edges
    const targetNodeIds = new Set();
    rawData.edges.forEach(e => {
      if (activeEdgeTypes.has(e.group)) {
        if (activeNodeGroups.has(getNodeById(e.from).group)) {
          targetNodeIds.add(e.to);
        }
        if (activeNodeGroups.has(getNodeById(e.to).group)) {
          targetNodeIds.add(e.from);
        }
      }
    });

    const expandedNodeGroups = new Set([...activeNodeGroups, ...targetNodeIds]);
    const filteredNodes = rawData.nodes.filter(n =>
      activeNodeGroups.has(n.group) || targetNodeIds.has(n.id)
    );
    const nodeIds = new Set(filteredNodes.map(n => n.id));
    const filteredEdges = rawData.edges.filter(e =>
      activeEdgeTypes.has(e.group) && nodeIds.has(e.from) && nodeIds.has(e.to)
    );

    setAllCheckboxes(false);
    const visibleGroups = new Set(filteredNodes.map(n => n.group));
    const visibleEdgeTypes = new Set(filteredEdges.map(e => e.group));
    visibleGroups.forEach(g => setNodeCheckbox(g, true));
    visibleEdgeTypes.forEach(t => setEdgeCheckbox(t, true));

    renderGraph(filteredNodes, filteredEdges, null);
    return;
  }

  // Standard views
  setAllCheckboxes(false);
  if (view.nodeGroups) {
    view.nodeGroups.forEach(g => setNodeCheckbox(g, true));
  } else {
    document.querySelectorAll('#nodeFilters input').forEach(cb => cb.checked = true);
  }
  if (view.edgeTypes) {
    view.edgeTypes.forEach(t => setEdgeCheckbox(t, true));
  } else {
    document.querySelectorAll('#edgeFilters input').forEach(cb => cb.checked = true);
  }

  onFilterChange();
}

function setAllCheckboxes(checked) {
  document.querySelectorAll('#sidebar input[type="checkbox"]').forEach(cb => cb.checked = checked);
}

function setNodeCheckbox(group, checked) {
  const cb = document.querySelector('input[data-ng="' + group + '"]');
  if (cb) cb.checked = checked;
}

function setEdgeCheckbox(group, checked) {
  const cb = document.querySelector('input[data-et="' + group + '"]');
  if (cb) cb.checked = checked;
}

// ============================================================
// FILTER & RENDER
// ============================================================

function onFilterChange() {
  const activeGroups = new Set();
  const activeTypes = new Set();

  document.querySelectorAll('#nodeFilters input:checked').forEach(cb => activeGroups.add(cb.dataset.ng));
  document.querySelectorAll('#edgeFilters input:checked').forEach(cb => activeTypes.add(cb.dataset.et));

  const filteredNodes = rawData.nodes.filter(n => activeGroups.has(n.group));
  const nodeIds = new Set(filteredNodes.map(n => n.id));
  const filteredEdges = rawData.edges.filter(e =>
    activeTypes.has(e.group) && nodeIds.has(e.from) && nodeIds.has(e.to)
  );

  renderGraph(filteredNodes, filteredEdges, null);
}

function renderGraph(filteredNodes, filteredEdges, focusNodeId) {
  // Build vis nodes
  const visNodeData = filteredNodes.map(n => {
    const color = NODE_COLORS[n.group] || '#888';
    const size = NODE_SIZES[n.group] || 16;
    return {
      id: n.id,
      label: n.label,
      group: n.group,
      shape: n.group === 'BusinessDomain' ? 'diamond' : 'dot',
      size: size,
      color: {
        background: color,
        border: lightenColor(color, 40),
        highlight: {
          background: lightenColor(color, 30),
          border: '#ffffff',
        },
        hover: {
          background: lightenColor(color, 20),
          border: lightenColor(color, 60),
        },
      },
      font: {
        color: '#ffffff',
        size: n.group === 'BusinessDomain' ? 13 : 12,
        face: '-apple-system, Microsoft YaHei, sans-serif',
        strokeWidth: 3,
        strokeColor: 'rgba(0,0,0,0.7)',
      },
      borderWidth: 2,
      title: NODE_LABELS[n.group] + ': ' + n.label + (n.title ? '\n' + n.title : ''),
      shadow: {
        enabled: true,
        color: 'rgba(0,0,0,0.3)',
        size: 8,
        x: 0,
        y: 2,
      },
    };
  });

  // Build vis edges
  const visEdgeData = filteredEdges.map(e => {
    const sourceNode = getNodeById(e.from);
    const sourceColor = sourceNode ? NODE_COLORS[sourceNode.group] : '#888';
    const edgeColor = EDGE_COLORS[e.group] || lightenColor(sourceColor, 60);
    const isDashed = DASHED_EDGES.has(e.group);
    const hasArrows = !NO_ARROW_EDGES.has(e.group);

    return {
      from: e.from,
      to: e.to,
      color: {
        color: edgeColor,
        highlight: lightenColor(edgeColor, 40),
        hover: lightenColor(edgeColor, 20),
        opacity: 0.7,
      },
      width: 1.2,
      dashes: isDashed,
      arrows: hasArrows ? { to: { enabled: true, scaleFactor: 0.6, type: 'arrow' } } : { to: { enabled: false } },
      smooth: { type: 'curvedCW', roundness: 0.12 },
      font: {
        color: 'rgba(255,255,255,0.5)',
        size: 9,
        strokeWidth: 2,
        strokeColor: 'rgba(0,0,0,0.6)',
      },
      _edgeGroup: e.group,
    };
  });

  const visNodes = new vis.DataSet(visNodeData);
  const visEdges = new vis.DataSet(visEdgeData);

  const container = document.getElementById('graph');
  const data = { nodes: visNodes, edges: visEdges };

  const options = {
    physics: {
      enabled: true,
      barnesHut: {
        gravitationalConstant: -2500,
        centralGravity: 0.25,
        springLength: 140,
        springConstant: 0.035,
        damping: 0.12,
      },
      stabilization: {
        enabled: true,
        iterations: 300,
        updateInterval: 25,
      },
    },
    interaction: {
      hover: true,
      tooltipDelay: 150,
      navigationButtons: false,
      keyboard: true,
      multiselect: true,
      dragNodes: true,
      dragView: true,
      zoomView: true,
    },
    layout: {
      improvedLayout: true,
    },
  };

  if (network) network.destroy();
  network = new vis.Network(container, data, options);

  // Click handler for detail panel
  network.on('click', function(params) {
    if (params.nodes.length > 0) {
      const nodeId = params.nodes[0];
      showDetail(nodeId, visNodes, visEdges);
    } else {
      closeDetail();
    }
  });

  // After stabilization, focus on the node if needed
  network.once('stabilizationIterationsDone', function() {
    if (focusNodeId) {
      network.focus(focusNodeId, {
        scale: 1.2,
        animation: { duration: 800, easingFunction: 'easeInOutQuad' },
      });
      network.selectNodes([focusNodeId]);
      showDetail(focusNodeId, visNodes, visEdges);
    }
  });

  // Update stats
  updateStats(filteredNodes.length, filteredEdges.length);

  // Update legend
  updateLegend(filteredNodes, filteredEdges);
}

// ============================================================
// DETAIL PANEL
// ============================================================

function showDetail(nodeId, visNodes, visEdges) {
  const node = visNodes.get(nodeId);
  if (!node) return;

  const rawNode = getNodeById(nodeId);
  const group = node.group;
  const color = NODE_COLORS[group] || '#888';
  const groupLabel = NODE_LABELS[group] || group;

  const panel = document.getElementById('detail');
  const title = document.getElementById('detailTitle');
  const content = document.getElementById('detailContent');

  title.innerHTML = '<span style="color:' + color + '">' + groupLabel + '</span>: ' + node.label;

  let html = '';

  // ID
  html += '<div class="field"><span class="key">ID</span><span class="val" style="font-family:monospace;font-size:11px;">' + nodeId + '</span></div>';

  // Group badge
  html += '<div class="field"><span class="key">类型</span><span class="group-badge" style="background:' + color + '22;color:' + color + ';border:1px solid ' + color + '44;">' + groupLabel + '</span></div>';

  // Title / description
  if (rawNode && rawNode.title) {
    html += '<div class="field"><span class="key">描述</span><span class="val">' + rawNode.title + '</span></div>';
  }

  // Connected edges
  const connEdgeIds = network.getConnectedEdges(nodeId);
  const outgoing = [];
  const incoming = [];

  connEdgeIds.forEach(eid => {
    const edge = visEdges.get(eid);
    if (!edge) return;
    const edgeLabel = EDGE_LABELS[edge._edgeGroup] || edge._edgeGroup || '';
    if (edge.from === nodeId) {
      const targetNode = visNodes.get(edge.to);
      const targetLabel = targetNode ? targetNode.label : edge.to;
      const targetGroup = targetNode ? NODE_LABELS[targetNode.group] || '' : '';
      outgoing.push({
        label: edgeLabel,
        target: targetLabel,
        targetGroup: targetGroup,
        targetColor: targetNode ? NODE_COLORS[targetNode.group] : '#888',
      });
    } else {
      const sourceNode = visNodes.get(edge.from);
      const sourceLabel = sourceNode ? sourceNode.label : edge.from;
      const sourceGroup = sourceNode ? NODE_LABELS[sourceNode.group] || '' : '';
      incoming.push({
        label: edgeLabel,
        source: sourceLabel,
        sourceGroup: sourceGroup,
        sourceColor: sourceNode ? NODE_COLORS[sourceNode.group] : '#888',
      });
    }
  });

  if (outgoing.length > 0) {
    html += '<div class="conn-section"><div class="conn-title">出边 (' + outgoing.length + ')</div>';
    outgoing.forEach(o => {
      html += '<div class="conn-item"><span style="color:' + (EDGE_COLORS[o.edgeGroup] || '#888') + '">' + o.label + '</span> <span class="arrow">&rarr;</span> <span style="color:' + o.targetColor + '">' + o.target + '</span> <span style="color:var(--text-muted);font-size:10px;">(' + o.targetGroup + ')</span></div>';
    });
    html += '</div>';
  }

  if (incoming.length > 0) {
    html += '<div class="conn-section"><div class="conn-title">入边 (' + incoming.length + ')</div>';
    incoming.forEach(i => {
      html += '<div class="conn-item"><span style="color:' + i.sourceColor + '">' + i.source + '</span> <span class="arrow">&rarr;</span> <span style="color:' + (EDGE_COLORS[i.edgeGroup] || '#888') + '">' + i.label + '</span> <span style="color:var(--text-muted);font-size:10px;">(' + i.sourceGroup + ')</span></div>';
    });
    html += '</div>';
  }

  content.innerHTML = html;
  panel.style.display = 'block';
}

function closeDetail() {
  document.getElementById('detail').style.display = 'none';
}

// ============================================================
// SEARCH
// ============================================================

function handleSearch(query) {
  if (!network || !rawData) return;
  query = query.trim().toLowerCase();

  if (!query) {
    network.unselectAll();
    return;
  }

  const matchedIds = [];
  rawData.nodes.forEach(n => {
    if (n.id.toLowerCase().includes(query) || n.label.toLowerCase().includes(query)) {
      matchedIds.push(n.id);
    }
  });

  if (matchedIds.length > 0) {
    network.selectNodes(matchedIds);
    if (matchedIds.length === 1) {
      network.focus(matchedIds[0], {
        scale: 1.5,
        animation: { duration: 500, easingFunction: 'easeInOutQuad' },
      });
    }
  } else {
    network.unselectAll();
  }
}

// ============================================================
// STATS & LEGEND
// ============================================================

function updateStats(nodeCount, edgeCount) {
  const totalNodes = rawData.nodes.length;
  const totalEdges = rawData.edges.length;
  document.getElementById('stats').innerHTML =
    '显示: <span>' + nodeCount + '</span> / ' + totalNodes + ' 节点, ' +
    '<span>' + edgeCount + '</span> / ' + totalEdges + ' 边';
}

function updateLegend(filteredNodes, filteredEdges) {
  const activeGroups = new Set();
  const activeEdgeTypes = new Set();
  filteredNodes.forEach(n => activeGroups.add(n.group));
  filteredEdges.forEach(e => activeEdgeTypes.add(e.group));

  let html = '<div class="legend-title">节点图例</div>';
  Object.keys(NODE_LABELS).forEach(g => {
    if (activeGroups.has(g)) {
      html += '<div class="legend-item"><span class="dot" style="background:' + NODE_COLORS[g] + '"></span>' + NODE_LABELS[g] + '</div>';
    }
  });

  html += '<div class="legend-title" style="margin-top:8px;">关系图例</div>';
  Object.keys(EDGE_LABELS).forEach(g => {
    if (activeEdgeTypes.has(g)) {
      const dashed = DASHED_EDGES.has(g);
      html += '<div class="legend-item"><span class="edge-line' + (dashed ? ' dashed' : '') + '" style="border-color:' + EDGE_COLORS[g] + '"></span>' + EDGE_LABELS[g] + '</div>';
    }
  });

  document.getElementById('legend').innerHTML = html;
}

// ============================================================
// BOOTSTRAP
// ============================================================

loadData();
</script>
