# CommandGraph 设计态唯一配置入口。
# assets_root: 产物根（相对本文件所在目录 CommandGraph/）
# project_root: SFCGraph 根（相对本文件所在目录），source / md_path 相对它计算
#               —— 替代旧代码里写死的 D:/mywork 绝对路径
#
# 每个 (nf, version) 下：
#   source:        MML 命令 md 目录（相对 project_root）
#   steps:         依序执行的步骤名（mmlcommand → enrich → parameter）
#   parameter_csv: 可选，parameter 步骤才用（相对 project_root）
assets_root: data/assets
project_root: ..

ne:
  UDG:
    20.15.2:
      source: output/UDG_Product_Documentation_CH_20.15.2/OM参考/命令/UDG MML命令
      steps: [mmlcommand, enrich, parameter, configobject, paramref]
      parameter_csv: CommandGraph/data/test.csv
      mod_rules_csv: CommandGraph/data/rules/MOD规则.csv
      rmv_rules_csv: CommandGraph/data/rules/RMV规则.csv
      uniqueness_rules_csv: CommandGraph/data/rules/重复规则.csv
      param_reference_csv: CommandGraph/data/内网-参数引用规则.csv
  UNC:
    20.15.2:
      source: output/UNC 20.15.2 产品文档(裸机容器) 05/OM参考/命令/UNC MML命令
      steps: [mmlcommand, enrich, configobject, paramref]
