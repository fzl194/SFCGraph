notes: "GWFD-020251 VoLTE基础语音业务专属。IMS信令通常 TCP(6)+UDP(17) 双协议，需多次执行本命令配置两条分类器（任务示例 PRIORITY=1/PROTOCOL=6 + PRIORITY=2/PROTOCOL=17），属迭代配置非配法分叉。APN 引用 ADD APN(0-00020) 已配置实例（如 ims）。命令在 mml_commands.jsonl；CommandParameter 结构化对象待 CommandGraph 抽取（dependency_rule 集中标记于 feature task 2-00053）。命令级审查(2026-07-02)：bound=8/23 缺口 15 个(SRCIPV4SPECTYPE/SRCIPV6SPECTYPE/SRCIPV6ADDR/SRCIPV6PREFLEN/SRCPORTSPECTYPE/DSTIPV4SPECTYPE/DSTIPV4ADDR/DSTIPV4MASKLEN/DSTIPV6SPECTYPE/DSTIPV6ADDR/DSTIPV6PREFLEN/DSTPORTSPECTYPE/DSTPORTSTART/DSTPORTEND/PROSPECTYPE) 命令真相均 optional/conditional 且 1 特性数据规划表均未用到——主特性仅用 IPV4 SRC path(TCP/UDP)，按通用配置门槛不绑(*SPECTYPE 系列为配套 type 标记, 主特性采用默认值 ANY/SPECIFY 隐式表达)。若后续 IPV6 IMS 信令识别特性启用, 需新建独立 atom 覆盖 V6SRC* 参数。rule 0-00355 投影 cardinality 64000 + 仅新激活用户生效 + APN 仅配 IMS 业务 APN + 配置不当影响 IMS 语音信令告警(高危) + PRIORITY 同 APN 内唯一 1~64 + 前置 ADD APN(0-00020)。"