notes: "GWFD-110202 APN 级回落开关。APN 引用 ADD APN(0-00020)；HTTP2DEGRADESW 升级 decision_driven + DP 0-00142 (3-way: ENABLE/DISABLE/INHERIT, default INHERIT)。回落优先级: rule 级 > APN 级 > 全局; APN 级 INHERIT 时继承全局 SET SRVCOMMONPARA.HTTP2DEGRADESW(0-00148)。命令在 mml_commands；CommandParameter 待 CommandGraph 抽取。命令级审查(2026-07-02)：bound=2/2 与命令真相一致, 0 缺口。HTTP2DEGRADESW 由 variable 升级 decision_driven——3-way ENUM 是配置工程师显式选择(per-apn 配置), 不是来自不同数据源的取值, 但本特性跨 3 个命令行(全局/rule/APN)同参数配法分叉, DP 0-00142 与 rule 级 DP 0-00143/全局级 SRVCOMMONPARA 联动, 防止 3 层均 INHERIT 时无生效源。rule 0-00353 投影 cardinality 10000 + 立即生效 + 仅APN生效 + INHERIT 继承 SRVCOMMONPARA(0-00148) + 前置 ADD APN。"