# 影响命令集的 DP（feature 作用域内 target_type∈{task,command}）:
#   - 0-00003 防欺诈开关 (feature 层): DP=on → adds ADD SPECURRGRPLIST; DP=off → excludes
#   - 0-00002 业务匹配场景 (compound 1-00002 层): URL/IMS/any/异常 改过滤链子命令集
#   - 0-00001 计费方式 (atom 0-00001 层): 纯参数 impact (sets_value_pattern on USAGERPTMODE
#     + 条件 adds OFFMETERINGTYPE/ONLMETERINGTYPE)，不改 atom 出现/缺失 → 不进入枚举
# 变体只列 md 证实的 4 场景 × 防欺诈开关 on/off 的 md 子集。
# 防欺诈 on 仅在场景1(URL/高风险)有 md 示例(部署UPF脚本 ADD SPECURRGRPLIST: URRGROUPNAME=UrrGp_URL)。

variants:
  - name: 场景1-URL-防欺诈关
    dp_options:
      0-00002: opt-url
      0-00003: opt-off
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD FILTER
      - ADD L7FILTER
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      - ADD PROTBINDFLOWF
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      - SET URRGRPBINDING
      - SET REFRESHSRV

  - name: 场景1-URL-防欺诈开
    dp_options:
      0-00002: opt-url
      0-00003: opt-on
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD FILTER
      - ADD L7FILTER
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      - ADD PROTBINDFLOWF
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      - ADD SPECURRGRPLIST   # 防欺诈 on → adds
      - SET URRGRPBINDING
      - SET REFRESHSRV

  - name: 场景2-IMS
    dp_options:
      0-00002: opt-ims
      0-00003: opt-off
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD FILTERIPV6       # IMS 场景 adds
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      # IMS 场景 excludes L7FILTER + PROTBINDFLOWF
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      - SET URRGRPBINDING
      - SET REFRESHSRV

  - name: 场景3-any基础
    dp_options:
      0-00002: opt-any
      0-00003: opt-off
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD FILTER           # any 场景 adds IPv4
      - ADD FILTERIPV6       # any 场景 adds IPv6
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      - SET URRGRPBINDING
      - SET REFRESHSRV

  - name: 场景4-异常信令费率
    dp_options:
      0-00002: opt-abnormal
      0-00003: opt-off
    md_required_commands:
      - ADD URR              # OFF/ONLMETERINGTYPE=FREE (纯参数 impact, 命令仍在)
      - ADD URRGROUP
      - ADD PCCPOLICYGRP     # SIGURRGRPNAME 引用 UrrGp_abnormal
      - SET URRGRPBINDING    # DFTSIGURRGNAME (异常场景 adds 该参数)
      - SET REFRESHSRV
