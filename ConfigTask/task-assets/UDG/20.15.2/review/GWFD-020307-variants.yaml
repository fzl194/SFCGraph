# 影响命令集的 DP（feature 作用域内 target_type∈{task,command}）:
#   无 feature 级改命令集 DP。
#   - md 特性概述 §计费与话单 列 3 种 TCP 重传计费策略（单独费率/关联默认/不计费），但这 3 策略仅是
#     SET URRGRPBINDING 参数子集/取值差异——atom 0-00013 已固定 TCPCHGPROFLAG=CHARGING 锁定 md
#     唯一证实的"单独费率"路径，"关联计费（默认）/不计费"无独立配置步骤（属参数口径调整），不改变
#     命令出现/缺失 → 不构成命令集分叉 → 不挂 feature DP（spec §4.2 仅枚举改命令集的 DP）。
#   - 继承的 backbone DP（0-00002 过滤链场景 / 0-00003 防欺诈开关）：本特性 md 仅"参考部署UPF"，
#     未列举任何具体过滤场景或防欺诈示例，故不为本特性枚举这些 DP 的子选项（spec §4.2 按 md 收口）。
#
# 处理：本特性退化为单变体（扁平并集校验，spec §4.2 末段 "F 无影响命令集的 DP → 退化为单变体"）。
# md_required = 完整 backbone（部署UPF = 2-00001 全集）+ License + TCP 重传差量 atom 0-00013。
# 注：SET URRGRPBINDING 由 backbone 1-00004 结构提供（0-00013 DFT 子集）+ 本特性差量（0-00013 TCP 子集），
#   命令名层面同一命令，结构命令集去重后 1 个 SET URRGRPBINDING。
# 注：ADD SPECURRGRPLIST 由 backbone 1-00004 结构提供（防欺诈 atom 0-00014），md"参考部署UPF"继承，
#   md_required 含此命令反映 backbone 完整结构（与 2-00001 同款）。

variants:
  - name: 完整配置（部署UPF backbone + TCP重传差量）
    dp_options: {}   # 无 feature 级 DP 分支 → 扁平并集校验
    md_required_commands:
      # 计费三件套（backbone 1-00001）
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      # 过滤链全集（backbone 1-00002，md 参考部署UPF 未裁剪）
      - ADD FILTER
      - ADD FILTERIPV6
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      - ADD L7FILTER
      - ADD PROTBINDFLOWF
      # 规则与用户模板绑定（backbone 1-00003）
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      # 收尾（backbone 1-00004，含可选防欺诈 atom 0-00014 + 缺省费率 0-00013 + 刷新 0-00015）
      - ADD SPECURRGRPLIST
      - SET URRGRPBINDING        # backbone DFT 子集 + 本特性 TCP 子集（同命令去重）
      - SET REFRESHSRV
      # License（特性激活前置，atom 0-00019，LICITEM=LKV3G5TCPR01）
      - SET LICENSESWITCH
