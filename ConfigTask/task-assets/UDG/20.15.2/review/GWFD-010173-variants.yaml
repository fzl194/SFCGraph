# 影响命令集的 DP（本特性 variants 枚举）:
#   - 0-00002 业务匹配场景 (compound 1-00002 owner): 融合 md 部署UPF §任务示例完整列举 4 场景
#     (URL=场景1 / IMS=场景2 / any=场景3 / 异常=场景4),与 2-00001 部署UPF 同构。故 4 option 均证实。
#     (opt-basic-l34 在本特性 md 未单独出现——md 直接展示完整 4 场景而非简化三四层基础,故不选)
#   - 0-00003 防欺诈开关 (feature 2-00001 owner,通过 backbone 1-00004 继承): 选 opt-on
#     融合 md 部署UPF §任务示例含 "ADD SPECURRGRPLIST:URRGROUPNAME=UrrGp_URL"(场景1 防欺诈示例)。
#   - 0-00156 融合可选SET开关 (feature 2-00004 owner,本特性级): on/off 切 1 个融合可选 SET 命令
# 不进入枚举的 DP（纯参数 impact 或 B 段作用域外）:
#   - 0-00001 计费方式 (atom 0-00001 owner, 冻结): opt-converged 仅参数 impact(USAGERPTMODE 描述
#     指 URRGROUP 内在线+离线 URR 共存),不 adds/excludes atom → 不进枚举（锁定为 opt-converged
#     由特性本身决定）
#   - 0-00004 计费方式 (generalized 4-00001 owner, B 段作用域外): A 段不依赖
#
# 关于 SET URRGRPBINDING 的处理:
#   - 与 2-00001/2-00002/2-00003 不同,融合 md 部署UPF §任务示例脚本"显式列"
#     SET URRGRPBINDING(L379-380,两个 USERPROFILE 各配 DFTURRGRPNAME+DFTSIGURRGNAME),无简化展示缺口。
#   - 故本特性 md_required 含 SET URRGRPBINDING 直接由 md 字面证实(非仅 backbone 结构推断)。
#
# 变体组织说明:
#   融合 md 部署UPF §任务示例同时展示 4 过滤场景(每场景一组 RULE),属"同一部署的多业务场景并列",
#   非互斥变体。但覆盖校验需 per-variant 离散 dp_options 组合,故按"主场景代表 + 防欺诈/可选SET"
#   组织 md 证实的代表性变体。变体 1-4 对应 md 4 场景(防欺诈 on + 不含 URRFAILACTION);
#   变体 5 在场景1(URL)基础上叠加 URRFAILACTION 证实可选 SET(opt-on 通路)。

variants:
  - name: 场景1-URL防欺诈(主示例,不含可选SET)
    dp_options:
      0-00002: opt-url
      0-00003: opt-on
      0-00156: opt-off
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD SPECURRGRPLIST       # md 任务示例 L314 防欺诈示例
      - ADD FILTER
      - ADD L7FILTER
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      - ADD PROTBINDFLOWF
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      - SET URRGRPBINDING         # md 任务示例 L379-380 显式列
      - SET REFRESHSRV

  - name: 场景2-IMS(不含可选SET)
    dp_options:
      0-00002: opt-ims
      0-00003: opt-on
      0-00156: opt-off
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD SPECURRGRPLIST        # md 任务示例 防欺诈(场景1)与场景2 并列部署
      - ADD FILTERIPV6
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      - SET URRGRPBINDING
      - SET REFRESHSRV

  - name: 场景3-any基础业务(不含可选SET)
    dp_options:
      0-00002: opt-any
      0-00003: opt-on
      0-00156: opt-off
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD SPECURRGRPLIST
      - ADD FILTER
      - ADD FILTERIPV6
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      - SET URRGRPBINDING
      - SET REFRESHSRV

  - name: 场景4-异常信令费率(不含可选SET)
    dp_options:
      0-00002: opt-abnormal
      0-00003: opt-on
      0-00156: opt-off
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD SPECURRGRPLIST
      - SET URRGRPBINDING         # md 任务示例 L380 DFTSIGURRGNAME=UrrGp_abnormal
      - SET REFRESHSRV

  - name: 场景1-URL防欺诈+融合可选SET追加
    dp_options:
      0-00002: opt-url
      0-00003: opt-on
      0-00156: opt-on
    md_required_commands:
      - ADD URR
      - ADD URRGROUP
      - ADD PCCPOLICYGRP
      - ADD SPECURRGRPLIST
      - ADD FILTER
      - ADD L7FILTER
      - ADD FLOWFILTER
      - ADD FLTBINDFLOWF
      - ADD PROTBINDFLOWF
      - ADD RULE
      - ADD USERPROFILE
      - ADD RULEBINDING
      - SET URRGRPBINDING
      - SET REFRESHSRV
      - SET URRFAILACTION         # md 调测步骤8 可选(业务被阻塞时放通,RETRYFAILACT=CONTINUE)
