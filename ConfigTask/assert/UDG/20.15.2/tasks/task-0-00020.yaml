notes: "ADD APN 为 APN管理 基础命令，跨特性共享(GWFD-020308/GWFD-020305/GWFD-010104/GWFD-010151/GWFD-010251 前置)。pass-1 录 APN+APPLAYERVOLUME(GWFD-020308)；pass-3(B02 批次)补 HASVPN+VPNINSTANCE(GWFD-010104)；命令级审查(2026-07-02)补双栈 HASVPNIPV6+VPNINSTANCEIPV6(GWFD-020403) 并把 APN 名称源升级 decision_driven(NB-IoT/eMTC 速率控制需与控制面一致→DP 0-00065)，投影 10000 上限→rule 0-00150。APPLAYERVOLUME=ENABLE 影响计费流量统计口径(仅L7)。未绑冷门参数(命令真相 optional 且无特性数据规划表用到): PSEUDOACTSWITCH/RESTORPGWSWITCH/PDTNSWITCH/HEADENGRAYLIST/CFGDOMAINNAME，按通用配置门槛不绑。"
