notes: "GWFD-020423 单臂 echo BFD 检测模板(BFD 类型=BFD Echo/单臂 BFD 时用)。与 0-00144(双向 BFD)二选一, 由 DP 0-00024(BFD 类型)决定。TEMPLATENAME 供 AUTOSCALINGSRROUTE.BFDTEMPLATENAME(0-00142)引用; SERVICENAME 引用 AUTOSCALINGSERVICE(0-00141); DESTADDR4=网关接口 IP(从对端获取)。BFDTYPE/IPVERSION 固定取值。命令级审查(2026-07-02): 0 补参(参数 8/8 全部绑定完整, 与命令真相+③数据规划表完全一致); 3 缺口(DESTADDR6/MINRXINTERVAL/MINTXINTERVAL) 单臂 echo BFD 不配(单向 BFD 仅需 MINECHORXINT, 不需双向收/发间隔/目的 IPv6), 严格按通用配置门槛不绑; 0 必补 rule——DP 0-00024 已编排 0-00143/0-00144 二选一关系, 双向 BFD 规格与前置依赖由 0-00144 的 rule 0-00232 投影。命令在 mml_commands; CommandParameter 待 CommandGraph 抽取。"
