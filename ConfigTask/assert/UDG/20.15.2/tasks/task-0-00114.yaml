notes: "GWFD-020402 N6/Gi/SGi接口IPv6组网 + IPFD-015004 IPsec功能。配置外联口物理IP前的主接口启用步骤(步骤4a)。IFNAME 为物理主接口(Ethernet70/0/4 等)，后续在其上建子接口(ADD INTERFACE 子接口 IFNAME=Ethernet70/0/4.1)。与 ADD INTERFACE(0-00056) 区别：MOD 改状态、ADD 建子接口。命令级审查(2026-07-02): 修 binding 2 升级 decision_driven(IFMTU+IFDF→DP 0-00096)——跨特性配法分叉：020402 仅启用主接口(IFMTU/IFDF 不绑) vs IPsec配置(IFMTU=1500 必配；GRE over IPsec LoopBack IFDF=FALSE 必配)；补参数 IFMTU+IFDF 路径(同 pass-1 静态 conditional 升级 DP 化)；IFDESCR/IFTRAPENABLE/IFSTATITVL 冷门 optional 无特性用到→不绑；IFSTATIENABLE 仅 GRE-over-IPsec 单脚本 TRUE→按通用配置门槛不绑(与 0-00056 一致)；IFNAME 2特性均本端规划无分叉→保留 local_planned(区别 0-00056 升级 decision_driven，后者含 010107 全网规划分叉)；IFADMINSTATUS=fixed:up 反映 UDG 启用主接口用途(命令真相 optional 但本 atom scope 内恒 up，up/down 能力的高危约束见 rule 0-00243)；source_evidence 扩展至 IPFD-015004。命令在 mml_commands.jsonl；CommandParameter 待 CommandGraph 抽取。"
