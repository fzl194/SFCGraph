notes: "ADD TWAMPCLIENT(Light 模式独有，UDG 作发送端)。TWAMPARCH=LIGHT 固定；LOCALIPV4 引用 ADD TWAMPLOGICINF(0-00225) 且须一致；VRFNAME 引用 ADD TWAMPVPNINST(0-00224)；CLIENTID 将被 ADD TWAMPSENDER(0-00228) 引用。Light 不走 TCP 控制连接(静态配置代替)。CommandParameter 待 CommandGraph 抽取(§6.B)。命令级审查(2026-07-02)：8/10 参数绑定(无功能缺口)；缺 DSCP/DESCRIPTION 为 optional 冷门(命令真相，特性 md 未用)；校正 requiredness：LOCALIPV4/PEERIPV4/LLOCALUDPPORT/LPEERUDPPORT 改 conditional(命令真相 AF=IPV4 时)；VRFNAME 改 optional(命令真相，本特性必填)。feature-挂 DP 0-00036(TWAMP 模式)已表达 LIGHT/FULL 互斥；rule 0-00081(TWAMP 一致性)已表达 LOCALIPV4=逻辑接口IP/VRFNAME 一致性。命令最大记录数 12000 + CLIENTID 1~12000 + UDP 端口范围由 CommandParameter 校验承担。"
