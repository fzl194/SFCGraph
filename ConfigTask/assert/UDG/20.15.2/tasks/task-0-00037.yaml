notes: |
  GWFD-020354 基于业务的Shaping + GWFD-110301 基于终端系统的码率差异化控制 共享。命令 ADD BWMRULE 未在 by_command 复用索引(§6-B)。
  BWMRULETYPE 跨特性分叉：SUBSCRIBER_SPECIFIC(020354 用户级规则) vs GROUP_SPECIFIC(110301 用户组级规则) → DP 0-00101 编排（互斥二选一 + BWMRULENAME 配套必选）。
  命令级审查(2026-07-02) 演进：status draft→inferred；BWMRULETYPE 由 variable 升级 decision_driven；BWMRULENAME 由 conditional 升级 decision_driven（命令真相 conditional 保留为 DP 影响）；source_evidence 扩展至 2 特性。
  BWMRULEPRI 同一用户级/用户组级下规则优先级不能相同（uniqueness_rule 0-00254 投影）。
  不绑冷门（命令真相 conditional/optional 且 2 特性均未用）：RATTYPE/ROAMINGTYPE（接入制式/漫游场景）+ TIMERANGENAME1-4 + UPBWMCTRLNAME2-4/DNBWMCTRLNAME2-4（多时段多控制器，本特性单时段单控制器）+ SERVICELEVEL（业务级别，本特性未启用）+ CFGDOMAINNAME（配置域）。