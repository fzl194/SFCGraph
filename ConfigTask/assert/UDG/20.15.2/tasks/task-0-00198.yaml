notes: "高级IPv4 ACL规则。基本ACL只能基于源IP匹配(ACLRULEBAS4)，高级基于五元组。范围段3000-3999。源/目的IP及反掩码取自全网规划(需与对端主机IP一致)，规则行为/协议/端口取本端规划。命令级审查(2026-07-02): 补绑 ACLSRCPORTOP/ACLDESTPORTOP(TCP/UDP 时必选)+ ACLSRCPORTEND/ACLDESTPORTEND(PORTOP=Lt/Range时必填)，③ TCP/UDP场景必填；ACLRULEID/ACLFRAGTYPE/VRFNAME/ACLRULEDESCRIPTION/ACLPRECEDENCE/ACLTOS/ACLDSCP/ACLICMPNAME/ACLICMPTYPE/ACLICMPCODE/ACLSYNFLAG/ACLTTLOP/ACLTTL/ACLTTLEND ③ 未使用→不绑(冷门/垂直场景)；WebProxy 2-00031 路由策略引用 ACLRULEADV4 通过 0-00203 QOSRULEACL 跨 atom 引用(0-00198:ACLNAME)。WebProxy SVRIP/HOSTNAME 等高级匹配维度不在 ACLRULEADV4 范畴(FILTER/SVRIP 走 0-00004 ADD FILTER,见 §B 表)。执行后立即生效+最大记录数65535+前置 ACLGROUP→rule 0-00075/0-00076 投影。CommandParameter 待抽取。"
