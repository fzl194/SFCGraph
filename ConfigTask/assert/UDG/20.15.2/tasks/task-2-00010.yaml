notes: |
  GWFD-020303 基于业务流量的计费。形态 STEP-OK:backbone 1-00001~04 全复用(Jaccard=1.0,4 候选相位
  完全同义)+ 直挂 0-00019(SET LICENSESWITCH) license 前置。无新建 compound / atom / feature DP。

  流量计费差异的三层表达(A 段 pass-2 判定):
  - 参数级(atom DP 0-00001,冻结):UPF 侧 metering 差异 = ADD URR 的 OFFMETERINGTYPE/ONLMETERINGTYPE
    取 VOLUME(默认值),由 atom 0-00001 挂 DP 0-00001 的 option(opt-offline/opt-online 的
    effect_detail 已含 "VOLUME/TIME/EVENT/FREE 取值")覆盖。纯参数 impact,不改命令集 → 不进 variants
    枚举(spec §4.2)。**关键:VOLUME 是内容计费默认形态,本特性连参数级差量都没有**(对比 2-00009
    时长计费至少在 metering=TIME 有参数值差量)。命令集与参数值均与 2-00001 内容计费 100% 一致。
  - feature DP:无。本特性部署 md 仅走 backbone,无 feature 级可选命令(对比 2-00002 三可选 /
    2-00003/04 各一可选 SET URRFAILACTION)。流量计费的统计由 UNC 话单/OCS CCA 信元承载
    (特性概述 §原理概述:datavolumeFBCUplink/CC-Total-Octets/totalVolume 等 AVP),非 UDG UPF MML,
    不构成本特性的 UPF 命令集分叉。
  - rule:feature 挂 rule 0-00019(dependency_rule,license 82209824 LKV3G5VBCS01 + 内容计费前置)
    已存在并核实正确,指向 0-00019 + 2-00001。无需新增 rule(md 未揭示新 UPF 级约束)。

  variants:1 变体(DP 0-00002=opt-basic-l34 + DP 0-00003=opt-off)。覆盖校验 exit 0(结构 13 /
  md_required 13 / DP 收敛 0)。防欺诈分叉由 2-00001 pass-2 已承载,本特性不重复枚举(spec §5 不合并)。
  generalized DP 0-00004(B 段作用域外)负责"是否叠加 2-00002/03/04 在线/离线/融合特性",本特性只承担
  "流量"差量(实为默认形态),与上层不冲突。

  与 2-00009(时长计费)同构:二者部署 md 任务示例字节级相同(均用 VOLUME),仅特性标题/预期 metering
  语义不同。2-00009 在 metering=TIME 有参数值差量(TIME≠默认),本特性 VOLUME=默认值无差量。

  缺口(非 Task 层错误):
