  数据来源(获取方法列): 6 参数均=本端规划。
  核心演进债(§B 跨特性分叉)：SERVERTYPE 跨 REDIRECT(110281 用户Portal + 110282 Web Proxy 重定向场景) vs PCSCF(020253 IMS P-CSCF 故障恢复场景)分叉 → decision_driven + DP 0-00150。default=REDIRECT(主场景)。
