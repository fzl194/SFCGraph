notes: |
  命令级审查(2026-07-02) 演进。
  1 特性使用(110284 HTTP智能重定向专属)，无跨特性分叉，不建 DP。
  数据来源: SMTHTTPREDINAME/SERVERURL/EXTFLTTYPE1/EXTFLTTYPE2=本端规划；EXTFLTNAME1/EXTFLTNAME2/APPENDINFONAME/BINDERRCODENAME=已配置数据中获取(reference)。
