  配套 rule 0-00297 投影：最大记录数 50 + 立即生效 + URL 特殊字符转义(?→%3f、 空格→%20、逗号→%2c) + 最多 5 组扩展过滤器 + 引用 EXTENDEDFILTER/REDIRAPPENDINFO/ERRORCODE + 引用 RULE(POLICYTYPE=SMARTREDIRECT)。
  SMTHTTPREDINAME 产出对象被 ADD RULE(POLICYTYPE=SMARTREDIRECT) 的 POLICYNAME 引用(reference)。
  CommandParameter 结构化对象待 CommandGraph 抽取(§6.B)。