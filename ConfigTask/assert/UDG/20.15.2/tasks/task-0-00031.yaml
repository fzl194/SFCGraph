notes: |
  GWFD-020357 增强的ADC基本功能专属。命令 ADD ADCPARA 不在 mml_commands.jsonl（缺命令，§6-A 处置）；
  参数细节从特性 md 数据规划表抽取。仅在 PCRF/PCF 经预定义规则下发 APPLICATION_START/STOP Event-Trigger 时配置。
  FLOWINFORPT 默认 DISABLE(本端规划但取值受业务需求约束)，ADCHYSTIMER 默认 0(全网规划)。
  命令级审查(2026-07-02) 补审：缺口 4(KEYFLOWDETECTSW/KEYFLOWTIME/KEYFLOWSPEED/REDIRECTNAME)均为命令真相 optional 且仅 1 特性(GWFD-020357)未用到，按"通用配置"门槛不绑(关键流检测/重定向为冷门场景)。补 atom rule 0-00400(cardinality 8000)。注：任务简报提及"ADCLEVEL/ADCNAME 跨特性分叉"经核 ADD ADCPARA 命令真相无此二参(属 ADC 规则族他命令)，本 atom 无跨特性分叉。
