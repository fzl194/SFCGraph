notes: "GWFD-010155/020401/020406 IPv6 OSPFv3 路径。VRFNAME 引用 ADD L3VPNINST(0-00071)(与 IPv4 ADD OSPF 0-00074 同源约定；③LST VPNINST 为查询命令非创建源)。VPNINSCAPSIMFLG=TRUE 取消VPN环路检查(VPN多实例必需,020406 md 明示否则路由引入失败)。VIRTUALSYSFLAG 共网段虚拟系统使能(decision_driven→DP 0-00022,进程级与接口级须同时配)。BFDALLINTFFLG=TRUE 使能 BFD(010155/020406)。与 IPv4 ADD OSPF(0-00074) 平行(由 DP 0-00017 ip-version 选择)。命令级审查(2026-07-02): 缺口24参数全为 OSPF 协议进阶(BFD间隔/SPF/Stub/Domain/SA等)，3特性数据规划表+脚本仅用 PROCID/ROUTERID/VRFNAME/BFDALLINTFFLG/VPNINSCAPSIMFLG/VIRTUALSYSFLAG 六参，严格按通用配置筛均不绑(进阶参数一律不绑)；PROCID 跨特性获取方法分叉(全网/本端)但取值同构,按 0-00074 先例保 global_planned；VPNINSCAPSIMFLG 绑参(020406 数据规划表显式行+md 说明双重强调,强于 0-00074 的'仅 md 说明');VIRTUALSYSFLAG 由 notes 备补升级为 decision_driven 绑定(DP 0-00022 已建模其预期取值)。投影 rule 0-00200(进程规格/Router-ID全网唯一/VPN环路检查条件/共网段)。"
