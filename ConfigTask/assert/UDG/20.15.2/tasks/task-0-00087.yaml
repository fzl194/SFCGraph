notes: |
  GWFD-110281(用户Portal)/GWFD-110282(Web Proxy)/GWFD-020253(P-CSCF 故障恢复) 共享 atom。
  INTERFACENAME 引用心跳检测逻辑接口名(由 0-00083 ADD LOGICINF 配置,2-00091 IPFarm 变体)。
  核心演进债(§B 跨特性分叉):SERVERTYPE 跨 REDIRECT(110281/110282) vs PCSCF(020253)分叉 → decision_driven + DP 0-00150(与 0-00086 SET IPFARMGLOBAL 共享 DP)。
  补绑 3 参数:SERVERTYPE(跨特性,decision_driven)、VPNINSTANCE(PCSCF 场景 ims_vpn 必配)、VIRTUALIP(PCSCF 场景 10.1.1.1/10.2.2.2 必配,IPV4 时唯一性约束)。
  冷门参数不绑(VIRTUALIPV6: IPv6 虚拟 IP,③无特性使用;WPSELECTMODE/WPCONFLICTACT: Web Proxy 服务器选择模式/冲突动作,③数据规划表未配)。
  md 约束: 不同 IP Farm 下的服务器需要配置不同的心跳检测接口;不允许将同一个 virtual IP 配置到不同的 IP farm 上(virtual IP 与 IPFarm 一一对应)。
  跨 SERVERTYPE 时 VIRTUALIP 必填(REDIRECT 场景 VIRTUALIP 可选,本端按 PCSCF 必填显式列,REDIRECT 场景由决策引擎跳过或取 null)。
  CommandParameter 结构化对象待 CommandGraph 抽取(§6.B)。
