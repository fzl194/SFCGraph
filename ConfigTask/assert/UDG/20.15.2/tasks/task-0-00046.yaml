notes: "GWFD-010104(HOSTROUTEIP) + GWFD-110910(FRAMEDROUTE)。P0 收敛：合并原 variant 0-00221。SET APNADDRESSATTR 设场景相关开关: HOSTROUTEIP=ENABLE(010104 主机地址接入) 或 FRAMEDROUTE=ENABLE(110910 Routing Behind MS)，两 flag 各 feature 按需设其一(requiredness=conditional)。APN 引用 ADD APN(0-00020)。互斥/约束(110910): APN 已使能 L2TP 则无需本功能；使能后该 APN anti-spoofing 自动关闭；AAA Server 需先配终端IP段。命令级审查(2026-07-02): 投影 notes 10000上限→rule 0-00151、每APN一条+前置ADD APN→rule 0-00152；12 个缺口参数(SUPPORTIPV4/V6/ANTISPOOFINGDL/UL/IPTYPEFORDUALIP/SINGLEADDRCAUSE/CPCTRL/IPV6RAMTUSW/IPV6MTU/IPV6RALIFETIME/IGNOREV4POOLID/IGNOREV6POOLID)命令真相均 optional 且 2 特性数据规划表均未用到，按通用配置门槛不绑。CommandParameter 待 CommandGraph 抽取。"
