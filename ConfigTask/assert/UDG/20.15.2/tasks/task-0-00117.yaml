notes: "GWFD-020406 IPv6 Prefix Delegation。双引用: PROCID←ADD OSPFV3(0-00078), AREAID←ADD OSPFV3AREA(0-00079)。VIRTUALSYSFLAG=TRUE 共网段虚拟系统使能(命令 notes: 进程级与接口级 VIRTUALSYSFLAG 须同时配;Tunnel 接口不支持)。DRPRI=0 避免 VNF 被选 DR/BDR。CFGROUTERIDFLAG=FALSE 不使能接口级 Router ID。与 IPv4 ADD OSPFINTERFACE/OSPFNETWORK(0-00076) 平行(由 DP 0-00017 ip-version 选择)。命令级审查(2026-07-02): 已绑 6 参(PROCID/AREAID/IFNAME/DRPRI/VIRTUALSYSFLAG/CFGROUTERIDFLAG)与③数据规划表+脚本完全一致,无需补参;缺口20参数全为 OSPF 接口进阶(BFD/定时器/MTU/NetworkType/认证等),020406 单特性未用,严格按通用配置筛均不绑。IFNAME 取 global_planned(③全网规划,接口名跨网元一致,非引用已配置)。投影 rule 0-00203(前置 ADD OSPFV3+AREA/规格8000/接口须先使能IPv6/DRPRI=0)。命令在 mml_commands.jsonl;CommandParameter 待 CommandGraph 抽取。"
