task_logical_name: 配置逻辑接口
task_layer: atom
task_intent: 增加逻辑接口（LoopBack/Tunnel），指定管理状态/MTU/不分片标记（路由冗余GRE隧道、IPsec隧道、IPv6组网等场景的LoopBack/Tunnel接口承载）
task_category: configure
ref: UDG@20.15.2@MMLCommand@ADD INTERFACE
status: inferred   # 命令级审查(2026-07-02): draft→inferred。CommandParameter 待 CommandGraph 抽取(§6B)
source_evidence_ids:
