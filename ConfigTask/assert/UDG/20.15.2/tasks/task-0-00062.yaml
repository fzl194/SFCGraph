notes: "一命令一atom：ADD SRROUTE 唯一 atom，服务 4 特性(GWFD-010107 冗余重定向 / GWFD-010155 VPN缺省+静态BFD / IPFD-015002 GRE隧道间 / IPFD-015004 IPsec引流)。P0 收敛：合并原 variant 0-00081。binding 默认值=010107(冗余重定向)：PREFIX=ref(0-00055 重定向IP/32)、VRFNAME=ref(0-00041 VPNINST)、IFNAME=ref(0-00056 GRE Tunnel)、BFDENABLE/DHCPENABLE=FALSE、NEXTHOP/DESTVRFNAME/SESSIONNAME 不配。跨场景取源分叉参数(PREFIX/VRFNAME/IFNAME/NEXTHOP/BFDENABLE/DESTVRFNAME)variable_source=decision_driven，由 atom 级 DP 0-00075 选定场景覆盖(binding 级单 source_ref 为 schema 限制，默认值+场景覆盖见 DP impacts)；010155 静态+BFD 场景亦由 feature 级 DP dp-0-00017(opt-route-static-bfd-ipv4) 选定，两者协同。BFDENABLE 原固定 FALSE 对静态+BFD 场景错误，已改 conditional decision_driven。命令级审查(2026-07-02)：rule 0-00181=记录数上限100000；rule 0-00182=__mpp_vpn_inner__ 禁默认路由。命令在 mml_commands.jsonl；CommandParameter 待 CommandGraph 抽取。"
