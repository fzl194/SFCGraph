notes: |
  GWFD-020354 基于业务的Shaping + GWFD-110301 基于终端系统的码率差异化控制(CAR) + GWFD-110313 基于智能Shaping的组级带宽控制(SHAPING AUTO) 三特性共享。命令 ADD BWMCONTROLLER 未在 by_command 复用索引(§6-B)。
  CTRLTYPE 跨特性分叉：SHAPING(020354 用户级整形/110313 智能组级整形) vs CAR(110301 终端系统码率差异) → DP 0-00100 编排（3 路分叉：SHAPING-MANUAL/SHAPING-AUTO/CAR + 配套必选参数）。
  命令级审查(2026-07-02) 演进：status draft→inferred；新增 14 个 binding（CAR 全套 CIR/CBS/PIR/PBS/GREEN/YELLOW/RED + SHAPING-AUTO 全套 SRVLEVELSPEC/USERFAIREN/WORKMODE/MAXPKTLOSTRATE/PKTLOSTRATEDTL/ASSUREMODE）；CTRLTYPE/RATE/QUEDEPTH 由 fixed/conditional 升级 decision_driven。
  不绑冷门（命令真相 conditional 且 3 特性均未用）：GREENREMARKT/V/C + YELLOWREMARKT/V/C + REDREMARKT/V/C（色重标记 12 参数，3 特性仅用基本色动作）+ COLORISAWARE/PRIORITYISAWARE（CAR 颜色敏感/优先级敏感）+ CFGDOMAINNAME（配置域）。
  推荐估算公式(命令 notes): QUEDEPTH = rate*RTT/pktlen；CAR 推荐 CIR = 0.5 * PIR / CBS >= CIR * 1.5 * 1000 / 8 / PBS >= PIR * 1.5 * 1000 / 8（110301 脚本备注）。