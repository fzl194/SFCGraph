notes: "GWFD-010108。task_category=activate(STR=Start，运行态探测非配置态)。IPPOOL 引用 ADD POOL(0-00043)；TESTMETHOD/DOMAINVALUE/WHOLEDETECT 受探测方式 DP(0-00014)驱动。md 注意: 同一时间只能执行一个探测；Tracert不支持全量且约450s返回；建议空载环境使用。命令级审查(2026-07-02): 命令真相 13 参数，已绑 8(IPPOOL/IPVERSION/SRCIPV4ADDR/DSTIPV4ADDR/TESTMETHOD/DOMAINVALUE/WHOLEDETECT/SECTIONNUM)，缺口 5 全跳过——SRCIPV6PREFIX/DSTIPV6PREFIX 属 IPv6 探测路径(IPVERSION 固定 IPV4，不走 IPv6)；DSCPV/TCV(DSCP/Traffic-Class)/LENGTH(报文净荷长度) 6 特性中仅 GWFD-010108 用此命令且数据规划表/示例脚本均未引用(冷门)，按通用配置门槛跳过(演进债)。DSTIPV4ADDR 维持 peer_planned(truth=global_planned 但语义=与PDN/DN侧对端协商服务器IP，peer_planned 更准)。投影 2 规则: safety_rule 0-00166(高危:可能去活在线用户) + sequencing_rule 0-00167(并发互斥/地址池前置/目的IP有效/仅留末次/Tracert耗时)。"
