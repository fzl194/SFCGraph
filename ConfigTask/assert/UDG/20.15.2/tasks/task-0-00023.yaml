notes: |
  命令级审查(2026-07-02) 演进。
  跨特性 020356 计费信息实时提醒（5 个 FLAG+IMSIENCRYALGORI 配套）vs 110284 HTTP智能重定向（仅 REQURL+IMSI）→ 升 DP 0-00110 编排字段组合。
  原 pass-1 录制 6 个 binding 中 REQURLFLAG/IMSIFLAG 固定 required+ENABLE、MSISDNFLAG fixed DISABLE、IMEIFLAG/MSIPFLAG fixed ENABLE——硬编码 020356 路径，无法表达 110284 精简场景。按 SKILL §4.5 升级为 decision_driven。
  缺参数清单（§4.3 ③ 缺口标注）：REQURLNAME/MSISDNNAME/MSISDNENCRYALGORI/MSISDNSECRETKEY(+CONFIRM)/IMSINAME/IMSISECRETKEY(+CONFIRM)/IMEINAME/IMEIENCRYALGORI/IMEISECRETKEY(+CONFIRM)/MSIPNAME/MSIPENCRYALGORI/MSIPSECRETKEY(+CONFIRM)/TIMENAME/TIMETYPE/TIMEENCRYALGORI/TIMESECRETKEY(+CONFIRM)/CFGDOMAINNAME 18 个冷门参数不绑（主场景取字段默认名 dest_url/msisdn/imsi/imei/msip/u，020356 IMSISECRETKEY 未传列入待核）。
  020356 任务示例 IMSIENCRYALGORI=AES256 与命令真相默认 AES256_GCM 不一致——按实操值采纳，列入 mml_commands 枚举待核（命令真相枚举可能含 AES256）。
  配套 rule 0-00295 投影：最大记录数 1000 + 立即生效 + 字段默认名 + 加密配套必填 + 跨特性 FLAG 组合 + 引用 SET GYONESHOT(0-00024)。
  DP 0-00110 编排 FLAG+IMSIENCRYALGORI；IMEI/MSIP/MSISDN/TIME 的 ENCRYALGORI/SECRETKEY/SECRETKEYCONFIRM 全 absent（两特性均不走这几项加密）。
  APPENDINFONAME 产出对象被 SET GYONESHOT(0-00024) 引用(reference)。
  CommandParameter 结构化对象待 CommandGraph 抽取(§6.B)。