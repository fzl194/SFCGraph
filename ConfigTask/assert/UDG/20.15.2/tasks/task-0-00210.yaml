notes: "聚合 atom: ADD L3VPNINSTIPSEC + ADD VPNINSTAFIPSEC + ADD INTERFACEIPSEC + ADD IPBINDVPNIPSEC + ADD IFIPV4ADDRESSIPSEC(IPsec微服务侧全链)。遵循双配原则: 接口名/接口IP/隧道类型/VPN 须与VNRS侧一对一一致，否则业务不通。CommandParameter 待抽取。命令级审查(2026-07-02): 聚合债(同0-00147 SET BGP类型) - 5 命令合 1 atom; bound 4(L3VPNINSTIPSEC:VRFNAME reference→0-00071 + VPNINSTAFIPSEC:AFTYPE=ipv4uni fixed + INTERFACEIPSEC:IFNAME reference→0-00056 + IFIPV4ADDRESSIPSEC:IFIPADDR reference→0-00058); 4 IPSec子场景子md(普通IPv4 IPsec隧道/GRE over IPsec/IPv4 IPsec主备/OSPF over IPsec)共享同一配置; AFTYPE=ipv4uni 固定(主场景 IPv4 单播)，IPv6 场景应改 ipv6uni 由 feature task 投影。VRFNAME 不能为 _public_/__mpp_vpn_inner__。"
