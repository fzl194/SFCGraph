notes: "GWFD-010155 IPv4 OSPF 路径。PROCID 引用 ADD OSPF(0-00074)，AREAID 引用 ADD OSPFAREA(0-00075)。IPADDRESS/WILDCARDMASK 全网规划，脚本对多网段重复执行(10.8.7.0/0.0.0.15 与 10.8.8.0/0.0.0.15)。可选 ADD OSPFINTERFACE(接口属性,优先级=0避免VNF被选DR/BDR) 记此 notes。命令级审查(2026-07-02): 缺口仅 DESCRIPTION(可选描述,③2特性数据规划表/脚本均未用)严格筛不绑；4 必选参数全绑且②③一致。IPADDRESS/WILDCARDMASK 在 010155 脚本对多网段重复执行属正常迭代(每网段一条命令)，非单参多值。原仅引 010155，补 010104(同用此命令)。"
