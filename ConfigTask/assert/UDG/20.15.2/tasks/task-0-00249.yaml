notes: |
  GWFD-020482。SET DATAPLANEINFMODE 为入不转板"总开关"(上下行均不转板)。
  md 注意事项: 易与 SET DATAPLANEGIINFMODE 混淆——后者仅下行业务入不转板, 上行仍入转板, 不可误用。
  ROUTEENHANCEDSW 变更(DISABLE→ENABLE 或反向)前需将用户下线; 路由增强生效条件: ROUTEENHANCEDSW=ENABLE 且
  ADD AUTOSCALINGBGPLF 的 UDAD VCOM(发布的团体属性)不为 0(后者属于 BGP 自动化配置, 不在本特性命令域)。
  命令不在 mml_commands.jsonl(§6.A 缺命令), ref/parameter_ref 预写预期 ID, 参数细节从特性 md 数据规划表+命令手册抽, 待 CommandGraph 抽取回填。
  命令级审查(2026-07-02)：2/2 参数绑定完整；新增 atom rule 0-00386(safety: 高危 + 删除所有用户前置 + POD Type 检查 + 切片约束 + CPT SWITCH=DISABLE 前置 + 立即生效 + 命令 vs DATAPLANEGIINFMODE 防误用)。校正项：MODE=Instance 固定(特性 md 数据规划表强约束：开启入不转板必须用样例值 Instance)；ROUTEENHANCEDSW requiredness 保持 required(命令真相 conditional 但本特性必填仍给 required)。命令最大记录数 1 由 CommandParameter 校验承担。
