notes: "ADD TWAMPRESPONDER(Full 模式独有，UDG 作响应端)。TWAMPARCH=FULL 固定；LOCALIPV4 引用 ADD TWAMPLOGICINF(0-00225) 的 IPV4ADDRESS 且须一致。Full 走 TCP TWAMP-Control 协商 + UDP TWAMP-Test，故需配套 SET TCPKEEPALIVECFG(0-00229)。CommandParameter 待 CommandGraph 抽取(§6.B)。命令级审查(2026-07-02)：6/6 参数绑定完整(无缺口)；校正 requiredness：LOCALIPV4 改 conditional(命令真相 AF=IPV4 时)；SERVWAIT/REFWAIT 改 optional(命令真相 默认 900)。feature-挂 DP 0-00036(TWAMP 模式) 已表达 FULL/LIGHT 互斥；rule 0-00081(TWAMP 一致性) 已表达 LOCALIPV4=逻辑接口IP 硬约束。RESPONDERID 1~32 + 命令最大记录数 32 由 CommandParameter 与 feature-级约束承担，无需 atom-挂独立 rule。"
