notes: "GWFD-020412 本地配置方式专属(AAA 方式不建 L2TP 组, 由 RADIUS 下发 LNS)。LNS IP/密码/Magic-Number/发送窗口=与对端协商; 其余本端规划。LOCALLNSMODE=REDUNDANCY 时 SECONDLNSIP/SECONDPWD/CFMSECONDPWD 必填(主备); LOAD_SHARING 可配 6 LNS(>2 或 IPv6 用 ADD L2TPLNSINFO, 见 md 注)。VPNINSTANCE 引用 ADD VPNINST(0-00041)。所有 binding 按命令真相校准 requiredness(LOCALLNSMODE/AVPHIDDEN/HELLOINTERVALSW/RETRYTIMES/AUTHENTICATION/DOMAINNAME/LOCALNAME/PPPMAGICNUMBER/MAXSENDWINSIZE/VPNINSTANCE=optional; HELLOINTERVAL/FIRSTLNSIP/FIRSTPWD/CFMFIRSTPWD=conditional; SECOND*/CFM*SECOND*=conditional-on-REDUNDANCY)。冷门参数不绑(THIRD/SIXTHLNSIP+PWD+CFM/DSCPV/INITTUNNELNUM/MAXSESSIONNUM: 命令真相均 optional/conditional 且 L2TPLNSINFO 不在本次 18 命令范围; ③数据规划表亦未配多 LNS 模式)。命令在 mml_commands；CommandParameter 待 CommandGraph 抽取。"
