notes: |
  GWFD-020531 通用DNN漫游分流专属。命令 SET RTSDNNPARA 在 mml_commands.jsonl，parameter_references 为空(§6-B)，参数从 parameter_description 文本抽取。
  参数按公网UPF(PUBLICNETSW/N4RPTSW/UEIPCONFLICTCHK/UEIPREALLOC/UEIPREALLOCNUM/UEIPCONFLICTPLY)与专网UPF(PRIVATENETSW/NATALGPROTV4/NATALGPROTV6)角色分两组。N4RPTSW 数据来源为"与对端协商"(peer_planned)。
  命令级审查(2026-07-02)：9/12 参数绑定(无功能缺口)；缺 RPTCTRLINTERVAL(流控时间秒数)/PKTPROCACTION(报文处理动作)/RESCHKINTERVAL(资源阈值核查间隔分钟数) 均为 optional(命令真相)；N4/NATALG 在本特性场景下用；RESCHKINTERVAL 由整网阈值管控非本特性场景。3 缺口按 baseline §4.1 冷门不绑。
  校正 binding_type 自相矛盾(variable+value)：7 binding (PUBLICNETSW/PRIVATENETSW/UEIPCONFLICTCHK/UEIPREALLOC/UEIPCONFLICTPLY/UEIPREALLOCNUM等) 改为 decision_driven 由 atom-挂 DP 0-00152 公网UPF/专网UPF 角色编排（PUBLICNETSW/UEIP*为公网角色 mandatory；PRIVATENETSW/NATALG*为专网角色 mandatory），去除全部 value 字段(value 仅是 md 样例占位)。校正 requiredness：N4RPTSW/UEIPCONFLICTCHK 改 optional(命令真相)；UEIPREALLOC/UEIPREALLOCNUM/UEIPCONFLICTPLY 保持 conditional(命令真相，依赖 UEIPCONFLICTCHK)。
  新增 atom rule 0-00399(cardinality 1 + 立即生效 + 系统初始记录默认值 + 路由增强生效条件: ROUTEENHANCEDSW=ENABLE 且 ADD AUTOSCALINGBGPLF 的 UDAD VCOM 不为 0)。LOD SIGNATUREDB 之类的前置依赖(特性 md 步骤编排)由 task_relations propagated_context 表达。
