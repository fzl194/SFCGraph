notes: |
  GWFD-020352(IPv6 SA 阻塞业务)/GWFD-110331(业务流标识无线资源优化)/GWFD-112001(Proxy UPF 漫游)共享 atom——三场景均需配置门控(PASS/DISCARD)。
  门控枚举: PASS/DISCARD，默认 PASS。数据来源(命令 parameter_description)=本端规划。
  取值样例:
  - 020352(阻塞上行): UPINITUPGATE=DISCARD, UPINITDNGATE=DISCARD, DNINITUPGATE=PASS, DNINITDNGATE=PASS
  - 110331(FPI 下行透传): 仅配 UPINITDNGATE=PASS(其他默认)
  - 112001(Proxy UPF 漫游 pcc_pass/pcc_drop 双套): 4 个门控全配
  本 atom 录全 4 个门控 binding(requiredness=optional, 因命令默认 PASS)；具体取值由特性场景决策(IPv6 SA 的阻塞方向 / FPI 下行透传 / Proxy UPF 漫游正常转发 vs 阻断)。因"来源固定(本端规划)但取值受决策影响"，按 SKILL §4.5: variable_source=local_planned,约束由特性层 DP/TaskRule 处理,不污染 variable_source。
  冷门参数不绑(UPINITREDIRNM/DNINITREDIRNM: 上行/下行发起重定向名称 1~31,命令真相 optional 但 UDG IPv6 SA/FPI/Proxy UPF 漫游三场景均未配重定向;CFGDOMAINNAME: 配置域 1~31,UDG 场景不配)。
  唯一性: PCCACTPROPNAME 全局唯一(命令 notes 约束)。
  max_records=200(命令 notes);命令真相 requiredness 校准: 仅 PCCACTPROPNAME=required,其余 7 参数=optional。
