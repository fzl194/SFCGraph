notes: "GWFD-110471(ICAP 互通 md)。ADD ICAPSERVER 配置 ICAP Server(URL 分类查询服务)。ICAPSERVERTYPE=URL_FILTERING 固定(本特性场景)。VPNINSTANCE 引用 ADD VPNINST(0-00041), 与 ADD LOGICINF 的 VPNINSTANCE 保持一致。ICAPSERVERNAME 供 ADD ICAPSVRBINDISG 引用。命令不在 mml_commands.jsonl(§6.A), 待 CommandGraph 抽取回填。命令级审查(2026-07-02)：5/10 参数绑定(无功能缺口)；缺 ICAPSERVERIPV6(冷门 IPV6 路径)/ICAPSERVERPORT(默认 1344)/TCPRETRYTIME(默认 5)/OPTIONINTERVAL(默认 10)/CFGDOMAINNAME(配置域) 均为 optional/conditional 且特性 md 未用，按 baseline §4.1 不绑。校正 requiredness：ICAPSERVERIPV4 保持 conditional(已正确)；VPNINSTANCE 改 optional(命令真相，本特性必填因 ICAP 必须经 VPN 转发)。当前特性统一走 IPv4 路径(IPTYPE=IPV4)，跨特性分叉（IPv6 路径）暂不显著，IPv4 绑 binding+IPv6 冷门不绑的实际语义已表达在 binding 集合上；feature-级 ICAP 互通编排（0-00259→0-00260→0-00261）由 task_relations propagated_context 已表达。新增 atom rule 0-00391(cardinality 30 + 单类型≤30 + 立即生效)。"
