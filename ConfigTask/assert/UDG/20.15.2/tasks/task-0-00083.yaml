notes: "GWFD-010155(Paif) + GWFD-110281/110282(IPFarm心跳) + GWFD-020412(L2TP源端Giif) + GWFD-020253(IPFarm-IMS) + GWFD-110606(S11-U信令面)。P0 收敛：合并原 variant 0-00094/0-00136/0-00176。ADD LOGICINF 创建用户面逻辑接口，用途维度(各 feature 按需): Paif(Untrusted Non-3GPP 互通, 010155, IPVERSION 由 DP 0-00017 IPv4/IPV6)、IPFarm 心跳检测本端接口(110281/282, 仅 IPv4 NAME/IPV4ADDRESS1/IPV4MASK1 无 VPNINSTANCE)、IPFarm-IMS(020253, IPv4+VPN)、L2TP 源端 Giif(020412, IPv4, VPNINSTANCE→ADD VPNINST 0-00041, 须与 APN 绑定 VPN 一致)、S11-U 信令面数据传输(110606, IPv4, 无 VPNINSTANCE)。VPNINSTANCE 用途相关(Paif→0-00071 L3VPNINST / L2TP-Giif→0-00041 VPNINST / IPFarm-IMS→VPN / IPFarm·S11-U 无；binding 级单 source_ref 为 schema 限制，默认 0-00071)。NAME 本端规划取值随用途(Paif1/1/0·Paif1/0/0、phif1/0/0、giif1/0/1·giif1/0/0、s11-uif1/1/0)。命令级审查(2026-07-02): binding 准确(IPVERSION decision_driven→DP0-00017 / VPNINSTANCE conditional 用途相关)；source_evidence 扩展至6特性全量。不绑冷门: IPV4ADDRESS2/MASK2(次IPv4地址)、IPV4MTU/IPV6MTU(默认1500/1800)、SLICEATTRSW(接口切片属性)——命令真相 conditional/optional 且6特性均未用。命令真相: 记录数上限4096(98%阈值告警ALM-135602215)，VPN绑定需前置 ADD VPNINST/L3VPNINST。命令在 mml_commands.jsonl；CommandParameter 待 CommandGraph 抽取。"
