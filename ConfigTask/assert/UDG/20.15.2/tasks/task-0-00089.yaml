notes: |
  GWFD-110283(DNS纠错)与GWFD-110284(HTTP智能重定向)共享 atom。
  数据来源(获取方法列): ERRORCODENAME=全网规划(DNS/HTTP 错误码命名属全网策略)，ERRORCODEOP/ERRORCODESTART/ERRORCODEEND=本端规划(操作码 EQUAL/GT 与起始值 3/400 由本端按业务决定)。
  GWFD-110283 任务示例: ERRORCODEOP=EQUAL, ERRORCODESTART=3(DNS 响应码 NXDOMAIN=3)。
  GWFD-110284 任务示例: ERRORCODEOP=GT, ERRORCODESTART=400(HTTP 4xx/5xx 错误码)。
  补绑 ERRORCODEEND 命令真相 conditional(0~1000,ERRORCODEOP=GE/LE 时必填,③脚本未显式配但与 START 同步控制错误码范围)。命令真相校准 ERRORCODESTART/ERRORCODEEND requiredness → conditional。
  ERRORCODENAME 产出对象被 DNSOVERWRITING(0-00090)/SMARTHTTPREDIR(0-00091) 的 BINDERRCODENAME 引用(reference)。
  CommandParameter 结构化对象待 CommandGraph 抽取(§6.B)。
