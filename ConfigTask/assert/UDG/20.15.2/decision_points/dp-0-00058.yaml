decision_id: UDG@20.15.2@DecisionPoint@0-00058
owner_task_ref: UDG@20.15.2@Task@0-00008   # 挂 atom（ADD FLTBINDFLOWF）
decision_name: 绑定的三四层过滤器协议族
decision_question: |
  FLTBINDFLOWF 的 FILTERNAME 引用何种协议族的三四层过滤器？
  - IPv4 FILTER：引用 ADD FILTER(0-00004) 配置的 IPv4 过滤器名。
  - IPv6 FILTERIPV6：引用 ADD FILTERIPV6(0-00005) 配置的 IPv6 过滤器名。
  注：同一 FILTERNAME 参数名可绑定两种过滤器，实际取值由上游 FILTER/FILTERIPV6 配置决定。一个 FlowFilter 可同时绑定 IPv4 和 IPv6 过滤器（多次执行本命令）。
decision_type: single_choice
trigger_condition: {expression_type: always, expression: ""}
requiredness: required
status: inferred
source_evidence_ids:
  - GWFD-020301/部署UPF_28493406.md
options:
  - option_id: opt-filter-ipv4
    option_name: 绑定IPv4过滤器
    option_value: IPV4
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00008:FILTERNAME, effect_type: sets_value_pattern, effect_detail: FILTERNAME 引用 ADD FILTER(0-00004) 配置的 IPv4 过滤器（如 L34_dns/L34_any/filter_red）}
  - option_id: opt-filter-ipv6
    option_name: 绑定IPv6过滤器
    option_value: IPV6
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00008:FILTERNAME, effect_type: sets_value_pattern, effect_detail: FILTERNAME 引用 ADD FILTERIPV6(0-00005) 配置的 IPv6 过滤器（如 ipv6_ims/L34_any_ipv6）}
default_option: opt-filter-ipv4
notes: |
  命令级审查(2026-07-02)新增。管理 FLTBINDFLOWF.FILTERNAME 的协议族来源分叉。
  依据：2-00001/2-00004 等特性中，同一 FlowFilter(ff_L34any/ff_IMS) 既绑定 L34_any(0-00004) 也绑定 L34_any_ipv6(0-00005)，FILTERNAME 参数跨 IPv4/IPv6 两个来源 atom。
  source_ref 默认保留 0-00004(IPv4)，IPv6 场景由本 DP 选项切换来源理解。
