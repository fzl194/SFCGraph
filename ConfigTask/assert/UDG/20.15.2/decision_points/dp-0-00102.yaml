decision_name: SADEDICBEARER 协议等级互斥(PROTOCOL vs PROTOCOLGROUP)
decision_question: |
  ADD SADEDICBEARER 的 PROTOCOLLEVEL 取哪个分支？二选一（命令真相 PROTOCOLLEVEL=PROTOCOL/PROTOCOLGROUP）：
  - PROTOCOL：按具体协议定义 SA 触发专有承载（PROTOCOLNAME 必配，PROTGROUPNAME 不配）。
  - PROTOCOLGROUP：按协议组定义 SA 触发专有承载（PROTGROUPNAME 必配，PROTOCOLNAME 不配）。
  命令 notes: PROTOCOLLEVEL=PROTOCOL 配 PROTOCOLNAME，PROTOCOLLEVEL=PROTOCOLGROUP 配 PROTGROUPNAME，二者一一对应互斥。
