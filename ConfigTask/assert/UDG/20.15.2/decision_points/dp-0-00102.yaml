  命令级审查(2026-07-02) 新建（独占段 0-00102~）。管理 ADD SADEDICBEARER 的 PROTOCOLLEVEL 二选一编排 + 配套 PROTOCOLNAME/PROTGROUPNAME 必选/非必选。
