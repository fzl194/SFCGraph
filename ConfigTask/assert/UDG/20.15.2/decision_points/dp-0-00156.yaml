decision_id: UDG@20.15.2@DecisionPoint@0-00156
owner_task_ref: UDG@20.15.2@Task@2-00004   # 挂 feature task（特性级可选开关）
decision_name: 是否配置融合计费可选 URR 上报失败动作
decision_question: 融合计费部署后，是否追加可选的 SET URRFAILACTION（URR 上报失败动作，业务被阻塞时放通）？
decision_type: boolean
trigger_condition: {expression_type: always, expression: ""}
requiredness: optional
status: inferred
source_evidence_ids: [GWFD-010173/调测融合计费的费率标识_91966529.md]
notes: |
  融合计费特性的 1 个可选 SET 命令开关。md 主示例部署脚本(部署UPF_79654301.md §任务示例)仅走
  backbone(无 SET 命令),属 opt-off 变体;调测 md(91966529.md)步骤 8 说明 文字描述:"当业务被
  阻塞时,如果想要放通业务,请执行 SET URRFAILACTION 命令,配置 RETRYFAILACT 参数为 CONTINUE",
  属 opt-on 变体(条件出现,新业务被阻塞时放通)。
  与 2-00002 在线 DP 0-00154 / 2-00003 离线 DP 0-00155 同型对偶:在线 opt-on 切 3 SET
  (UPDEFAULTQUOTA/UPGLBCHGPARA/URRFAILACTION),离线 opt-on 切 1 SET(URRFAILACTION),本 DP
  (融合)opt-on 亦只切 1 SET(URRFAILACTION——md 唯一在调测步骤标注的可选命令)。3 特性复用
  atom 0-00018(SET URRFAILACTION),但每特性独立决定是否追加(spec §5 同名决策多层共存不合并;
  §4.2 按 md 收口——每特性按自身 md 支持的 option 子集枚举)。
  上层 generalized DP 0-00004(opt-g-converged)决定"是否叠加 2-00004 特性";本 DP 在特性叠加后
  内部决定是否追加该可选命令,与上层不冲突(spec §5 同名决策可多层共存不合并)。
  规则交互:atom 0-00018 自挂的 rule 0-00119(cardinality 最大记录数1 + 高危漏计费风险提示)
  与 DP 0-00051(conditional_required: HOLDINGTIME 前提 RETRYFAILACT=BLOCK 或 CONTINUE)是
  命令级审查已闭环的约束,覆盖校验只校命令集出现/缺失,参数合规由 atom 层规则强制。
options:
  - option_id: opt-off
    option_name: 不追加
    option_value: "false"
    impacts:
      - {target_type: task, target_ref: UDG@20.15.2@Task@0-00018, effect_type: excludes, effect_detail: 跳过 SET URRFAILACTION}
  - option_id: opt-on
    option_name: 追加
    option_value: "true"
    impacts:
      - {target_type: task, target_ref: UDG@20.15.2@Task@0-00018, effect_type: adds, effect_detail: 配 SET URRFAILACTION(URR上报失败动作,业务被阻塞时放通,RETRYFAILACT=CONTINUE)}
