decision_id: UDG@20.15.2@DecisionPoint@0-00078
owner_task_ref: UDG@20.15.2@Task@0-00075   # 挂 atom ADD OSPFAREA：AREAID 获取方法跨特性分叉
decision_name: OSPF区域号(AREAID)来源
decision_question: ADD OSPFAREA 的 AREAID 取值来源？（OSPF 区域号须与对端路由器在同一区域达成一致，否则邻居无法建立。多数场景下 AREAID 由本端与对端协商确定(GWFD-010104 地址分配方式，标'与对端协商'，backbone/常规区域常取 0.0.0.0)；UDG 到 ePDG 动态路由组网(GWFD-010155 Untrusted Non-3GPP)则按全网规划取 0.0.0.1 等本端规划值。）
decision_type: single_choice
trigger_condition: {expression_type: always, expression: ""}
requiredness: required
status: inferred
source_evidence_ids: [GWFD-010104/激活地址分配方式_71653959.md, GWFD-010155/配置PGW-U到Untrusted Non-3GPP GW的数据（VPN+OSPF动态路由组网）（虚机容器）_72489252.md]
options:
  - option_id: opt-areaid-peer
    option_name: 与对端协商(peer)
    option_value: peer
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00075:AREAID, effect_type: sets_value, effect_detail: variable_source=peer；AREAID 须与对端路由器在同一区域协商一致(backbone 常取 0.0.0.0)，否则 OSPF 邻居无法建立。适用于地址分配方式等需与外部路由器对接的场景}
  - option_id: opt-areaid-global
    option_name: 全网规划
    option_value: global_planned
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00075:AREAID, effect_type: sets_value, effect_detail: variable_source=global_planned；AREAID 由 UDG 侧全网规划(如 ePDG 动态路由组网取 0.0.0.1)，仍须与对端在同一区域。适用于 PGW-U 到 ePDG 的 OSPF 等价路由负荷分担组网}
default_option: opt-areaid-peer
notes: |
  命令级审查(2026-07-02) 新建。③跨特性数据规划表"获取方法"列分布: 与对端协商(1, 010104) vs 全网规划(1, 010155)，源解析分叉(取值语义不同: peer 协商 backbone 0.0.0.0 / global 规划 0.0.0.1)→升级 decision_driven。原 pass-1 录制 global_planned 作为默认(对齐 010155 主路径 GWFD-010155)，改为由本 DP 选；default 取 opt-areaid-peer(OSPF 区域号本质须邻居一致，backbone 0.0.0.0 为最常见)。命令真相 AREAID 为 required IPv4 点分十进制。AREAID 同时被 ADD OSPFNETWORK(0-00076) 引用，故本 DP 决策会传递至下游网段配置。
