options:
  - option_id: opt-policytype-pcc
    option_name: PCC计费
    option_value: PCC
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00010:POLICYNAME, effect_type: sets_value_pattern, effect_detail: POLICYNAME 引用 ADD PCCPOLICYGRP 产出的 PCC策略组名(计费三件套前置)}
  - option_id: opt-policytype-smartredirect
    option_name: SMARTREDIRECT智能重定向
