    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00010:POLICYNAME, effect_type: sets_value_pattern, effect_detail: POLICYNAME 引用重定向动作对象名(IPFarm名 / DNS重写动作名 / HTTP智能重定向名)}
  - option_id: opt-policytype-webproxy
    option_name: WEBPROXY代理重定向
    option_value: WEBPROXY
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00010:POLICYNAME, effect_type: sets_value_pattern, effect_detail: POLICYNAME 引用 ADD IPFARM 产出的 IPFarm名(代理 server 池)}
default_option: opt-policytype-pcc
notes: |
  B03 批次反推新建。ADD RULE(0-00010) 当前 POLICYTYPE=fixed:PCC(pass-1 计费场景录制)，无法表达 B03 五特性的 SMARTREDIRECT/WEBPROXY 多样性。
  按 SKILL §4.2"一命令一 atom(不拆)"，POLICYTYPE 应升级为 decision_driven 由本 DP 选——但 0-00010 已被 18 特性引用且 status=inferred，按"演进只记录不执行"边界，本 pass 仅建 DP 标注演进建议，不修改 0-00010 的 POLICYTYPE binding。
  五特性选 option：GWFD-110281(用户Portal)=SMARTREDIRECT+PCC双规则；GWFD-110282(Web Proxy)=WEBPROXY+PCC双规则；GWFD-110283(DNS纠错)=SMARTREDIRECT；GWFD-110284(HTTP智能重定向)=SMARTREDIRECT；GWFD-110321(OTT规则库)=PCC。
  PCCPOLICYGRP/IPFARM/DNSOVERWRITING/SMARTHTTPREDIR 均为 POLICYNAME 的引用源——POLICYTYPE 决定引用哪类对象(sets_value_pattern)。
