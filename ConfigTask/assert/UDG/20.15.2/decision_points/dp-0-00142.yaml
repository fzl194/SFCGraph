  - option_id: opt-apn-disable
    option_name: APN 级关闭 HTTP2.0 回落
    option_value: DISABLE
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00149:HTTP2DEGRADESW, effect_type: sets_value, effect_detail: value=DISABLE；APN 级强制关闭, 不继承全局}
  - option_id: opt-apn-inherit
    option_name: 继承全局 (默认)
    option_value: INHERIT
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00149:HTTP2DEGRADESW, effect_type: sets_value, effect_detail: value=INHERIT(默认, 继承 SET SRVCOMMONPARA HTTP2DEGRADESW 0-00148)}
