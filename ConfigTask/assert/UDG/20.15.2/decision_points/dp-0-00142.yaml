notes: |
  命令级审查(2026-07-02) 新建（独占段 0-00136~0-00149）。管理 SET APNHTTP2DGRD HTTP2DEGRADESW 3-way 编排 (APN 层)。
  依据：命令真相 HTTP2DEGRADESW 3 路枚举 ENABLE/DISABLE/INHERIT(默认 INHERIT 继承全局)；回落优先级 rule>APN>全局, 三层联动——APN 级 INHERIT 时继承全局级 SET SRVCOMMONPARA HTTP2DEGRADESW。
  原 binding 标 variable+local_planned+required, 现升级 decision_driven + decision_ref 0-00142(3-way)。
  注：本 DP 与 rule 级 DP 0-00143 / 全局级 SET SRVCOMMONPARA 联动, 防止 3 层均 INHERIT 时无生效源——配置生成器应在 3-way DP default_option 编排上避免三 INHERIT 同时出现。
  与 rule 0-00353 联动(rule 校验 cardinality 10000 + 立即生效 + 仅APN生效 + INHERIT 继承全局)。