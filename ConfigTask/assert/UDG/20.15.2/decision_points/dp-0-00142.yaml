decision_id: UDG@20.15.2@DecisionPoint@0-00142
owner_task_ref: UDG@20.15.2@Task@0-00149   # 挂 atom SET APNHTTP2DGRD
decision_name: APN 级 HTTP2.0 协议回落开关 3-way 编排 (APN 层)
decision_question: |
  SET APNHTTP2DGRD 配置指定 APN 的 HTTP2.0 协议回落开关时, 选择哪种配置?
  - ENABLE: APN 级开启 HTTP2.0 协议回落——本特性 GWFD-110202 示例采用。
  - DISABLE: APN 级关闭 HTTP2.0 协议回落。
  - INHERIT: 继承全局级 SET SRVCOMMONPARA HTTP2DEGRADESW 配置(默认)——当本参数不显式配置时按全局生效。
  命令 notes：如果 HTTP2DEGRADESW 设置为继承, 则继承 SET SRVCOMMONPARA 命令的 HTTP2DEGRADESW 开关；APN 级 INHERIT 时, 实际生效值由全局级(0-00148) 决定。
  回落优先级：rule 级(0-00150) > APN 级(本 atom) > 全局级(0-00148)——本 DP 与 rule 级 DP 0-00143/全局级 SET SRVCOMMONPARA HTTP2DEGRADESW 联动, 防止 3 层均 INHERIT 时无生效源。
decision_type: single_choice
trigger_condition: {expression_type: always, expression: ""}
requiredness: required
status: inferred
