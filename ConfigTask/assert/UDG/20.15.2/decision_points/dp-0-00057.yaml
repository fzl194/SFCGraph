decision_name: Tethering检测开关
decision_question: |
  是否对该流过滤器配置 Tethering 检测标识（TETHERDETFLAG）？
  - 默认不配：普通业务流过滤器，不关注 Tethering（终端共享上网）检测。多数计费/PCC/URL过滤/重定向场景。
  - 显式 NONE：明确关闭 Tethering 检测。Proxy UPF 漫游、双故障 Bypass 等特殊场景为确保业务透传而显式关闭。
