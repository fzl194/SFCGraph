decision_id: UDG@20.15.2@DecisionPoint@0-00098
owner_task_ref: UDG@20.15.2@Task@0-00033   # 挂 atom ADD BWMUSERGROUP
decision_name: BWMUSERGROUP 业务类型（用户级 vs 用户组级）
decision_question: |
  ADD BWMUSERGROUP 的业务类型用哪个字段（用户级 vs 用户组级）？
  - 用户级：USERLEVSRVTYPE。020354 基于业务的 Shaping（URL 整形）用户级规则场景，脚本显式传 USERLEVSRVTYPE=NONTOS。
  - 用户组级：USERGLEVSRVTYPE。110301 基于终端系统的码率差异化控制 用户组级规则场景，脚本显式传 USERGLEVSRVTYPE=NONTOS。
  命令真相 USERLEVSRVTYPE/USERGLEVSRVTYPE 均 optional 默认 TOS；UDG 实际部署二选一（用户级/用户组级分组互斥）。
