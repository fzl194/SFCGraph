  - option_id: opt-user-lev-srvtype
    option_name: 用户级业务类型
    option_value: USERLEVSRVTYPE
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00033:USERLEVSRVTYPE, effect_type: sets_requiredness, effect_detail: requiredness=required；显式配 NONTOS 或 TOS 等取值；020354 路径}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00033:USERGLEVSRVTYPE, effect_type: sets_requiredness, effect_detail: requiredness=absent（不传，省略走默认 TOS）}
  - option_id: opt-user-glev-srvtype
    option_name: 用户组级业务类型
    option_value: USERGLEVSRVTYPE
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00033:USERGLEVSRVTYPE, effect_type: sets_requiredness, effect_detail: requiredness=required；显式配 NONTOS 或 TOS 等取值；110301 路径}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00033:USERLEVSRVTYPE, effect_type: sets_requiredness, effect_detail: requiredness=absent（不传，省略走默认 TOS）}
