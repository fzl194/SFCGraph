notes: |
  命令级审查(2026-07-02) 新建（独占段 0-00098~0-00101）。管理 ADD BWMUSERGROUP 的 USERLEVSRVTYPE/USERGLEVSRVTYPE 二选一编排。
  依据：跨特性业务类型字段分叉（020354 用户级走 USERLEVSRVTYPE，110301 用户组级走 USERGLEVSRVTYPE）；命令真相两者均 optional 默认 TOS，但 UDG 实际部署互斥二选一。
  原 pass-1 录制：USERLEVSRVTYPE binding required（命令真相 optional 误校为 required）。按 SKILL §4.5 升级为 decision_driven：USERLEVSRVTYPE 与 USERGLEVSRVTYPE 同源 DP 选一，default_option=用户级（020354 主特性路径）。
  注：本决策仅决定 USERLEVSRVTYPE/USERGLEVSRVTYPE 显式/省略 + 互斥，不影响 USERGROUPTYPE/USERGROUPNAME/USERGROUPPRI（均 required/必填无分叉）。