      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00034:PROTOCOLNAME, effect_type: sets_requiredness, effect_detail: requiredness=required；显式传协议名（110301 协议场景）}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00034:OSTYPE, effect_type: sets_requiredness, effect_detail: requiredness=required；显式传操作系统类型 IOS（110301 终端系统码率差异）}
default_option: opt-bwmsrv-protocol-ostype
notes: |
  命令级审查(2026-07-02) 新建（独占段 0-00098~0-00101）。管理 ADD BWMSERVICE 的 NONTOSSRVTYPE 4 路分叉编排。
  依据：跨特性 NONTOSSRVTYPE 取值分叉（CATEGORY_PROP/PROTOCOLGROUP/PROTOCOL 三路径 020354 + PROTOCOL+OSTYPE 110301）；命令真相支持 OSTYPE（md 备注 "基于OSTYPE进行带宽控制场景"）。
  原 pass-1 录制：BWMSERVICETYPE/NONTOSSRVTYPE/CATEPROPNAME 静态 fixed/conditional，无法表达 4 路分叉 + 配套必选参数。按 SKILL §4.5 升级为 decision_driven：4 个 option 互斥，default_option=PROTOCOL+OSTYPE（110301 主特性路径，覆盖最新 BWM 场景）。
  注：BWMSERVICETYPE 命令真相 required，但 UDG 2 特性均走 NONTOS，本决策固定 BWMSERVICETYPE=NONTOS（实际为 sets_value=NONTOS，由 option 选项决定）。命令真相允许 TOS，但 UDG 当前未激活。