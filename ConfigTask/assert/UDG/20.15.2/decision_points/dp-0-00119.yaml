owner_task_ref: UDG@20.15.2@Task@0-00256   # 挂 atom ADD CONTCATEGROUP
decision_name: CONTCATEGROUP 内容分类类型分叉（SPECIFIC/RANGE/PRIORITY/NAME）
decision_question: |
  ADD CONTCATEGROUP 的 CATEGORYTYPE 取哪个分支？四路互斥（命令真相枚举 SPECIFIC/RANGE/PRIORITY/NAME）：
  - SPECIFIC：特定内容分类ID，CATEGORYID 必选；STARTID/ENDID/PRIORITY/CATEGORYNAME 不配。
  - RANGE：分类ID范围，STARTID+ENDID 必选（STARTID ≤ ENDID, 区间不可重叠）；CATEGORYID/PRIORITY/CATEGORYNAME 不配。
  - PRIORITY：优先级，PRIORITY 必选（全局唯一, 整机最多1条, 默认65535）；STARTID/ENDID/CATEGORYID/CATEGORYNAME 不配。
  - NAME：内容分类名称，CATEGORYID+CATEGORYNAME 必选（注：命令真相 CATEGORYID 在 SPECIFIC 或 NAME 时必选）；STARTID/ENDID/PRIORITY 不配。
  命令真相 CATEGORYTYPE required；STARTID/ENDID conditional (RANGE) / CATEGORYID conditional (SPECIFIC/NAME) / PRIORITY conditional (PRIORITY) / CATEGORYNAME conditional (NAME)。
decision_type: single_choice
