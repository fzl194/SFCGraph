decision_id: UDG@20.15.2@DecisionPoint@0-00100
owner_task_ref: UDG@20.15.2@Task@0-00036   # 挂 atom ADD BWMCONTROLLER
decision_name: BWMCONTROLLER 控制类型分叉（SHAPING-MANUAL/SHAPING-AUTO/CAR）
decision_question: |
  ADD BWMCONTROLLER 的 CTRLTYPE 取哪个分支？三路互斥（UDG 3 特性）：
  - SHAPING（基础整形 MANUAL）：020354 URL 整形 + 110313 简单场景（脚本 L67 WORKMODE=MANUAL），必配 RATE/QUEDEPTH，可选 MAXFDNUM。
  - SHAPING-AUTO（智能组级整形 WORKMODE=AUTO）：110313 智能组级带宽控制场景（脚本 L73 WORKMODE=AUTO），必配 RATE/QUEDEPTH + SRVLEVELSPEC/USERFAIREN/WORKMODE=AUTO + MAXPKTLOSTRATE/PKTLOSTRATEDTL/ASSUREMODE（保障模式 EXPFIRST）。
  - CAR（承诺接入速率）：110301 基于终端系统的码率差异化控制，必配 CIR/CBS/PIR/PBS/GREEN=PASS/YELLOW=PASS/RED=DISCARD。
  命令真相 CTRLTYPE optional 默认无；RATE/QUEDEPTH conditional（SHAPING 必选）；CIR/CBS/PIR/PBS conditional（CAR 必选）。
decision_type: single_choice
trigger_condition: {expression_type: always, expression: ""}
requiredness: required
status: inferred
source_evidence_ids:
