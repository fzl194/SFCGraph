notes: |
  命令级审查(2026-07-02) 新建（独占段 0-00098~0-00101）。管理 ADD BWMCONTROLLER 的 CTRLTYPE 3 路分叉编排 + 16 个配套必选/必不传参数。
  依据：跨特性 CTRLTYPE 分叉（SHAPING 020354/110313 vs CAR 110301）；SHAPING 内部又分 MANUAL（020354/110313 简单）与 AUTO（110313 智能组级）——WORKMODE 决定 SHAPING 子分支。
  原 pass-1 录制：CTRLTYPE 静态 fixed=SHAPING，仅覆盖 020354；110301 CAR + 110313 AUTO 全部 14 个参数漏绑。按 SKILL §4.5 升级为 decision_driven：3 个 option 互斥，default_option=SHAPING-MANUAL（020354 主特性路径）。
  注：本决策是 BWM 族核心演进债（§B 标记的"多用途 atom"——同一 BWMCONTROLLER atom 被 3 个特性以不同 CTRLTYPE 复用）。MAXFDNUM 三特性可选不参与 DP（保持 optional）；命令真相 CTRLTYPE optional 在本 DP 固定为 SHAPING/CAR 二选一（SHAPING 内部 MANUAL/AUTO 子分支）。