decision_id: UDG@20.15.2@DecisionPoint@0-00140
owner_task_ref: UDG@20.15.2@Task@0-00110   # 挂 atom SET APNREPORTATTR
decision_name: APN 上报类型 REQUESTED 时的别名 APN 解析编排
decision_question: |
  SET APNREPORTATTR 配置 APN 上报属性时, 当 HEADERENRICH/PERFORMANCE/SERVICEREPORT 任一取 REQUESTED 类型时, 是否需要配别名 APN 解析规则?
  - REQUESTED_REAL_APN: 上报类型取 REQUESTED, 启用别名 APN→真实 APN 解析——别名 APN 不是真实 APN, 性能统计/头增强/业务报表上报到别名 APN 对应的真实 APN。
  - REQUESTED_DIRECT: 上报类型取 REQUESTED, 直接上报别名 APN 本身(无真实 APN 映射)——仅适用于别名 APN 即业务标识场景。
  - DEFAULT_SERVICE: 上报类型取 SERVICE(默认)——本特性 GWFD-110332 默认采用, 无别名 APN 解析需求。
  命令 notes：当配置使用的 APN 类型为 REQUESTED 时, 如果用户激活请求里的 APN 是别名 APN, 则对于性能统计使用的 APN 是别名 APN 对应的真实 APN——UPF 支持虚拟 APN/别名 APN/普通 APN, 别名 APN 不是真实 APN。
decision_type: single_choice
trigger_condition:
  expression_type: parameter_value
  expression: SET APNREPORTATTR.HEADERENRICH=REQUESTED OR PERFORMANCE=REQUESTED OR SERVICEREPORT=REQUESTED
requiredness: optional
status: inferred
source_evidence_ids:
  - GWFD-110332/激活基于小区负荷上报的无线资源优化_30927860.md
options:
  - option_id: opt-requested-real-apn
    option_name: REQUESTED 解析到真实 APN
    option_value: REQUESTED_REAL_APN
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:HEADERENRICH, effect_type: sets_value, effect_detail: value=REQUESTED+别名APN→真实APN映射}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:PERFORMANCE, effect_type: sets_value, effect_detail: value=REQUESTED+别名APN→真实APN映射}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:SERVICEREPORT, effect_type: sets_value, effect_detail: value=REQUESTED+别名APN→真实APN映射}
  - option_id: opt-requested-direct
    option_name: REQUESTED 直接使用别名 APN
    option_value: REQUESTED_DIRECT
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:HEADERENRICH, effect_type: sets_value, effect_detail: value=REQUESTED(直接, 无映射)}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:PERFORMANCE, effect_type: sets_value, effect_detail: value=REQUESTED(直接, 无映射)}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:SERVICEREPORT, effect_type: sets_value, effect_detail: value=REQUESTED(直接, 无映射)}
  - option_id: opt-default-service
    option_name: 默认 SERVICE (本特性默认)
    option_value: DEFAULT_SERVICE
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:HEADERENRICH, effect_type: sets_value, effect_detail: value=SERVICE(默认, 无别名APN解析需求)}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:PERFORMANCE, effect_type: sets_value, effect_detail: value=SERVICE}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00110:SERVICEREPORT, effect_type: sets_value, effect_detail: value=SERVICE}
default_option: opt-default-service
notes: |
  命令级审查(2026-07-02) 新建（独占段 0-00136~0-00149）。管理 SET APNREPORTATTR 3 个上报字段(HEADERENRICH/PERFORMANCE/SERVICEREPORT) REQUESTED 类型时的别名 APN 解析编排。
  依据：命令真相 REQUESTED 类型强约束"如果用户激活请求里的 APN 是别名 APN, 则对于性能统计使用的 APN 是别名 APN 对应的真实 APN"——配置工程师必须明确别名 APN 解析行为。
  注：本特性 GWFD-110332 任务示例仅显式配 CONGESTIONRPT=ENABLE, 3 个上报字段保持默认 SERVICE, 默认无别名 APN 解析需求——主机特性场景下不触发本 DP。
  原 binding 3 字段标 variable+optional, 本 DP 在 REQUESTED 场景下提供 2 路径选项(解析到真实 APN / 直接使用别名 APN), 防止配置工程师误用 REQUESTED 类型导致上报错 APN。
  与 rule 0-00350 联动(rule 校验 cardinality 10000 + 每APN唯一 + 修改PERF前去活)。