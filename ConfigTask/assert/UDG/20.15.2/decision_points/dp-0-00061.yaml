decision_id: UDG@20.15.2@DecisionPoint@0-00061
owner_task_ref: UDG@20.15.2@Task@0-00043   # 挂 atom（ADD POOL）：POOLTYPE 决定地址池类型，跨特性核心分叉
decision_name: 地址池类型（POOLTYPE）
decision_question: |
  ADD POOL 的 POOLTYPE 取 EXTERNAL 还是 LOCAL？（决定地址分配方式及后续 SECTION/IPVERSION 链路形态。）
  - EXTERNAL（外部地址分配）：地址由外部网元（RADIUS/BRAS/DHCP）或静态分配，UDG 仅发布路由。地址分配方式/静态地址用户路由冗余/IPv6 Prefix Delegation 等场景使用。
  - LOCAL（本地地址池分配）：UDG 自身维护地址段并为用户分配本地地址。双栈接入/入不转板等本地分配场景使用。
  注：命令默认 LOCAL，但 UDG 多数激活场景用 EXTERNAL；POOLTYPE 进一步影响 IPVERSION 配置与下游 ADD SECTION 的地址段类型（IPv4 V4* / IPv6 V6PREFIX*）。
decision_type: single_choice
trigger_condition: {expression_type: always, expression: ""}
requiredness: required
status: inferred
source_evidence_ids:
  - GWFD-010104/激活地址分配方式_71653959.md
  - GWFD-010107/激活静态地址用户路由冗余_19612403.md
  - GWFD-020403/激活IPv4v6双栈接入_38276180.md
  - GWFD-020406/激活外部网元地址分配的IPv6 Prefix Delegation功能_80269177.md
  - GWFD-020482/激活入不转板功能_28210142.md
options:
  - option_id: opt-pooltype-external
    option_name: EXTERNAL外部地址分配
    option_value: EXTERNAL
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00043:POOLTYPE, effect_type: sets_value, effect_detail: POOLTYPE=EXTERNAL；地址由外部网元分配，UDG 仅发布路由}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00043:CHECKIPVALID, effect_type: optional_enable, effect_detail: 静态地址白名单检测场景可置 ENABLE（如 020406 Prefix Delegation）}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00043:REDUNDFUNC, effect_type: optional_enable, effect_detail: 静态地址用户路由冗余场景可置 ENABLE（如 010107，需配合 SET REDUNDUSER 全局开关）}
  - option_id: opt-pooltype-local
    option_name: LOCAL本地地址池分配
    option_value: LOCAL
    impacts:
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00043:POOLTYPE, effect_type: sets_value, effect_detail: POOLTYPE=LOCAL；UDG 自身维护地址段并分配本地地址（命令默认值）}
      - {target_type: parameter, target_ref: UDG@20.15.2@Task@0-00044:IPVERSION, effect_type: correlates, effect_detail: LOCAL 池需配套 ADD SECTION 提供地址段（IPv4 V4* / IPv6 V6PREFIX*，由 IPVERSION 决定）}
default_option: opt-pooltype-external
notes: |
  命令级审查(2026-07-02)新增。管理 ADD POOL.POOLTYPE 的取值分叉（地址池族核心演进点，见 CONSOLIDATION-BACKLOG 地址池族已知演进点）。
  依据：5 特性数据规划表中 POOLTYPE 取值分叉——
    EXTERNAL（固定取值/本端规划）：010104 地址分配方式、010107 静态地址用户路由冗余、020406 IPv6 Prefix Delegation；
    LOCAL（全网规划/固定取值）：020403 IPv4v6双栈接入、020482 入不转板功能。
  0-00043 原 binding fixed:EXTERNAL（pass-1 仅覆盖 010104 外部地址分配），无法表达 LOCAL 场景。按 SKILL §4.2 升级为 decision_driven：POOLTYPE binding 改 variable+decision_driven+decision_ref(本 DP)，default_option=EXTERNAL（多数 UDG 场景）。
  本 DP 选项进一步联动 CHECKIPVALID/REDUNDFUNC（EXTERNAL 静态场景可选使能）及下游 SECTION（LOCAL 池必配地址段）。
