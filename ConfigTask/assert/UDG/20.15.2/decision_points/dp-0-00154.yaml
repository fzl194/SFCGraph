notes: |
  在线计费特性(md 步骤6-8)的 3 个可选 SET 命令开关。md 主示例脚本仅走 backbone(无 SET 命令),
  属 opt-off 变体;md 步骤6-8 文字描述提供 3 个 SET 命令的可选项,属 opt-on 变体。
  上层 generalized DP 0-00004(opt-g-online)决定"是否叠加 2-00002 特性";本 DP 在特性叠加后
  内部决定是否追加这 3 个可选命令,与上层不冲突(§5 同名决策可多层共存不合并)。
  规则 0-00011(UPDEFAULTQUOTA vs UPGLBCHGPARA.CREDITPOOLSW 不能同使能)是配置值约束,
  由 conditional_rule 强制;本 DP 只管命令集出现/缺失,不强制配置值组合。
options:
  - option_id: opt-off
    option_name: 不追加
    option_value: "false"
    impacts:
      - {target_type: task, target_ref: UDG@20.15.2@Task@0-00016, effect_type: excludes, effect_detail: 跳过 SET UPDEFAULTQUOTA}
      - {target_type: task, target_ref: UDG@20.15.2@Task@0-00017, effect_type: excludes, effect_detail: 跳过 SET UPGLBCHGPARA}
      - {target_type: task, target_ref: UDG@20.15.2@Task@0-00018, effect_type: excludes, effect_detail: 跳过 SET URRFAILACTION}
  - option_id: opt-on
    option_name: 追加
    option_value: "true"
    impacts:
      - {target_type: task, target_ref: UDG@20.15.2@Task@0-00016, effect_type: adds, effect_detail: 配 SET UPDEFAULTQUOTA(默认配额开关)}
      - {target_type: task, target_ref: UDG@20.15.2@Task@0-00017, effect_type: adds, effect_detail: 配 SET UPGLBCHGPARA(Credit Pooling 等全局参数)}
      - {target_type: task, target_ref: UDG@20.15.2@Task@0-00018, effect_type: adds, effect_detail: 配 SET URRFAILACTION(URR上报失败动作)}
