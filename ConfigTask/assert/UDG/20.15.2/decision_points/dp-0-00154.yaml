decision_name: 是否配置在线专属可选命令
decision_question: 在线计费部署后，是否追加可选的在线专属命令（默认配额 / Credit Pooling / URR上报失败动作）？
decision_type: boolean
trigger_condition: {expression_type: always, expression: ""}
requiredness: optional
status: inferred
