  expression: |
    ADD SRVPBINDPCCPG 命令最大记录数为 100000。
    每个 PCC 策略组可以配置 10 个基于业务属性的非默认组合。
    立即生效：本命令执行后立即生效。
    空组合支持：所有参数都是 optional，如果一个都没有选，则配置一个空的 PCC 策略组业务属性绑定组合。
    跨组合匹配：若每个 PCC 策略组配多种非默认组合,匹配优先级由各组合决定(命令 notes 补充)。
    前置依赖：必须先建 PCCPOLICYGRPNM(0-00003 ADD PCCPOLICYGRP) 和 SRVPROPNAME(0-00029 ADD SERVICEPROP);可选 PCCACTPROPNAME(0-00028 ADD PCCACTIONPROP) 和 URRGROUPNAME(0-00002 ADD URRGROUP)。
    适用 NF：PGW-U、UPF。
violation_effect: 超 100000 上限新增失败；每 PG 超 10 组合冲突；未建 PG/业务属性导致引用失败
