    生效行为：本命令执行后只对新激活用户生效(已激活用户不受影响)——故须配合 SET REFRESHSRV(0-00015) 刷新并对新用户生效。
violation_effect: 超规格/超单 UP 绑定上限新增失败；绑定不一致策略失效；已激活用户不生效需重新激活或等待刷新
