  expression: |
    最大记录数 200000，>90% 上报 ALM-135602215 告警，阈值可由 MOD CFGTHRESHOLD 修改。
    单用户模板绑定规则数上限：默认规则用户模板(UPSPECTYPE=DEFAULT)最多 8000 个规则；规格受限用户模板(UPSPECTYPE=SPECIFICATION_LIMITED)上限更高(见命令②notes)。
