  expression: |
    SET APNOSLELBWMSW(atom 0-00107) 配置约束：
    (1) 上限：系统最大记录数为 10000(命令 notes 强约束)——APN 级别的最大实例数。
    (2) 生效范围限于 APN：本命令仅作用于指定 APN，与全局 SET GLBOSLELBWMSW(命令 ID 待 CommandGraph 抽取) 形成'全局→APN'两级开关。
    (3) ISENABLE 承继行为：若 ISENABLE 设置为继承(INHERIT/未明确枚举值)，则承继 SET GLBOSLELBWMSW 全局开关的 IsEnable 配置(命令 notes 强约束)——本 atom 当前 binding requiredness=required 静态=local_planned 仅覆盖 ENUM 直接显式值场景；后续全局 atom 揭示后建议升 decision_driven。
    (4) APNNAME 引用 ADD APN(atom 0-00020) 配置：主场景示例 APNNAME=apn-test；与 ADD APNBINDBWMUSRG 共用同一 APN 配置。
    (5) 该命令执行后立即生效(命令 notes)。
