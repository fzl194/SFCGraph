    THREADUPDINT 整数 64～256 ms（CommandParameter 校验承担）。
    FLOWCHKPPS 整数 50000～5000000 包/秒（CommandParameter 校验承担）。
    FLOWGUARDPKTNUM 整数 0～65535 包（CommandParameter 校验承担）。
    FLOWGUARDTIME 整数 5～500 ms（CommandParameter 校验承担）。
    CPUOVERLOADTHR 整数 50～90 %（CommandParameter 校验承担；冷门不绑）。
    CPUBIASDIFF 整数 5～50 %（CommandParameter 校验承担；冷门不绑）。
