condition: {expression_type: none, expression: ""}
constraint:
  constraint_type: max_records
  target_refs:
    - UDG@20.15.2@MMLCommand@SET RTSDNNPARA
  expression: |
    SET RTSDNNPARA 命令最大记录数为 1（命令 notes 强约束），超出被拒。
    该命令执行后立即生效（命令 notes）。
    该命令存在系统初始记录，参数的初始设置值如下表（命令 notes 系统默认值）。
    公网 UPF 角色 mandatory：PUBLICNETSW/N4RPTSW/UEIPCONFLICTCHK/UEIPREALLOC/UEIPREALLOCNUM/UEIPCONFLICTPLY（5 参数 mandatory，UEIPREALLOCNUM/UEIPCONFLICTPLY 仅 UEIPREALLOC=ENABLE 时必填）。
    专网 UPF 角色 mandatory：PRIVATENETSW；可选 NATALGPROTV4/NATALGPROTV6（IPv4/IPv6 NAT ALG 地址替换）。
    缺 RPTCTRLINTERVAL（流控时间秒数，0~3600）/PKTPROCACTION（报文处理动作）/RESCHKINTERVAL（资源阈值核查间隔 120~1440 分钟）均为 optional（命令真相）冷门不绑。
    跨场景取值由 atom-挂 DP 0-00152（公网 UPF/专网 UPF 角色）驱动。
violation_effect: 上限超限→SET 失败；公网/专网角色参数错配→配置失效；缺 UEIPREALLOCNUM 配错→冲突重分配次数不对
