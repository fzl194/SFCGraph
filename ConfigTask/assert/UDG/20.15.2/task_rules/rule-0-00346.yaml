rule_id: UDG@20.15.2@TaskRule@0-00346
owner_task_ref: UDG@20.15.2@Task@0-00173
rule_name: 0-00173 SET GLBDLLTBUFFER max_records=1 + 新数据流生效 + 不配APN场景 + 超Downlink Rate Limit丢包
rule_type: dependency_rule
rule_scope: atom
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: requires
  target_refs:
    - UDG@20.15.2@Task@0-00173
  expression: |
    SET GLBDLLTBUFFER(atom 0-00173) 配置约束：
    (1) 上限：单命令最大记录数为 1(命令 notes 强约束——整机级全局参数)；超限→SET 失败。
    (2) 新数据流生效：该命令执行后对新数据流生效(命令 notes)。
    (3) 场景生效：仅在不配置APN场景下生效(命令 notes)；若 APN 级配置(atom 0-00175 SET APNDLLTBUFFER), 优先级 APN>全局。
    (4) 超 Downlink Rate Limit 丢包告警：如果 UPF 配置的下行数据缓存个数超过 Serving PLMN 速率控制的 Downlink Rate Limit 值, 当缓存包数超过 Downlink Rate Limit 时触发丢包——设置缓存个数须同时考虑无线侧能力, 过大超过无线处理能力可能引发丢包(命令 notes 强约束)。
    (5) 系统初始记录：MAXBUFFERNUM=1, BUFFERMODE=BUFF_MODE_RING(命令 notes)。
    (6) DDN ACK 协同：MAXBUFFERNUM 与 DDN ACK 携带缓存个数取最小值(命令 notes)；若 DDN ACK 未携带, 用本参数。
violation_effect: 上限超限→SET 失败；不配APN场景外执行→配置不生效；超Downlink Rate Limit→丢包；未与 DDN ACK 协同→缓存个数错取
severity: warning
rule_expression_mode: inferred
rule_source_kind: command
status: inferred
source_evidence_ids: [GWFD-110601/激活NB-IoT eDRX模式_67487577.md, GWFD-110641/激活eMTC eDRX模式_70722748.md, GWFD-110661/激活5G eDRX模式_58609938.md]
notes: "命令级审查(2026-07-02)新增 rule。属 atom-level dependency_rule。投影命令 notes 6 大约束(max_records/新数据流生效/场景生效/Downlink Rate Limit 丢包告警/系统初始/DDN ACK 协同)。与 atom 0-00175 APN 级长时间缓存配置优先级联动：APN>全局。"