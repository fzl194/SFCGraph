rule_name: SET APNPPPACCESS 上限 10000 + 立即生效 + 系统初始记录 + 已接入用户不生效
rule_type: spec_rule
rule_scope: task
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: capacity_limit
  target_refs:
    - UDG@20.15.2@Task@0-00139
  expression: |
    SET APNPPPACCESS 系统最多支持配置 10000 条 ApnPppAccess，每 APN 一条。
    立即生效：本命令执行后立即生效。
    系统初始记录：存在系统初始记录，初始值为 AUTHENTICATION=DISABLE / MRU=NULL。
    行为约束：APN 实例下有用户存在时允许修改 AUTHENTICATION 配置，但修改后的配置对已接入的用户不生效（新激活用户生效）。
    适用 NF：PGW-U、UPF。
violation_effect: 超 10000 上限新增失败；已激活用户配置不生效需重激活/刷新
