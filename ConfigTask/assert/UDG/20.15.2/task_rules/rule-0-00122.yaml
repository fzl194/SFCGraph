rule_name: ADD L7FILTER 延时生效与记录数上限
rule_type: operational_constraint
rule_scope: command
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: must_refresh_and_capacity
  expression: |
    1. 该命令执行后 60s 生效（非立即，非 REFRESHSRV 刷新，而是固定延时）。
    2. L7Filter 最大记录数 20000；超过规格 90% 上报 ALM-135602215 配置数量超阈值告警。阈值可由 MOD CFGTHRESHOLD 修改。
    3. 每个 L7FILTERNAME 下最多配置 50000 个子七层过滤器名称（SUBL7FLTNAME）。
violation_effect: 配置延时生效 / 容量超限告警 / 子过滤器超限
severity: critical
