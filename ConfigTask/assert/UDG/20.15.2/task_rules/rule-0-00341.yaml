  expression: "该命令执行后立即生效；执行命令并不输入参数时该参数保持系统当前配置不变(可通过LST IKEGLOBALCONFIG查询)；需要CPU告警上报阈值(CPUREPORTTHRES)大于等于CPU告警恢复阈值(CPUCLEARTHRES)；如果安全日志阈值(DOSTHRESHOLD)不为0，链路协商失败时可能会导致日志大量打印；DPDTYPE=Periodic时DPDINTERVAL+DPDRETRYINTRVL配套生效；NATKLI在IKEPEER NATTRAVERSAL=TRUE(NAT穿越)场景生效。"
