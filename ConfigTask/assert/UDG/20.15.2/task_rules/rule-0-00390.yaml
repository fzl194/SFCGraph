notes: "命令级审查(2026-07-02) 新建。投影自命令 notes 全集：规格 1 + 立即生效 + 缓存更新周期联动（ICAP Server 缓存过期时间）+ CACHEIDLETIME<60s 截断规则 + 性能/延迟双平衡。"
