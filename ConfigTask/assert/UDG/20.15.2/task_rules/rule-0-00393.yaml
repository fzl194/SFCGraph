    要配置此命令，需要首先配置 ICAP Server 和 ICAP Server Group（命令 notes 前置依赖）。
    ICAPSVRGRPNAME 引用 ADD ICAPSVRGRP(0-00260)，ICAPSERVERNAME 引用 ADD ICAPSERVER(0-00259)（前置依赖已由 binding source_ref 表达）。
    缺 CFGDOMAINNAME 为 optional（命令真相配置域）冷门不绑。
