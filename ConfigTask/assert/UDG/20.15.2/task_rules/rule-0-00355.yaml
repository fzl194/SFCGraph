rule_id: UDG@20.15.2@TaskRule@0-00355
owner_task_ref: UDG@20.15.2@Task@0-00155
rule_name: 0-00155 ADD APNIMSSIGFLTR cardinality 64000 + 仅新激活用户 + 高危APN仅IMS + PRIORITY同APN唯一1~64 + 前置ADD APN
rule_type: dependency_rule
rule_scope: atom
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: requires
  target_refs:
    - UDG@20.15.2@Task@0-00155
    - UDG@20.15.2@Task@0-00020
  expression: |
    ADD APNIMSSIGFLTR(atom 0-00155) 配置约束：
    (1) 上限：单命令最大记录数为 64000(命令 notes 强约束)；超限→ADD 失败。
    (2) 仅新激活用户：该命令执行后只对新激活用户生效(命令 notes)；已激活用户不受影响。
    (3) 高危命令：本命令属于高危命令(命令 notes 警告)；请确认添加规则后合法的 IMS 信令报文都能命中其中一条规则——配置不当将影响 IMS 语音信令的转发, 造成语音不通。
    (4) APN 仅 IMS：执行该命令时, APN 参数只能配置为做 IMS 业务的 APN(命令 notes 强约束)——非 IMS APN 配置无意义且可能干扰 IMS 信令识别。
    (5) PRIORITY 同 APN 内唯一：PRIORITY 取值范围 1~64, 同一个 APN 内唯一(命令真相)；多次配置须保证 PRIORITY 不冲突。
    (6) 前置依赖：APN 必须先通过 ADD APN(atom 0-00020) 配置, 否则 ADD 命令 APN 引用失败。
    (7) 多次执行配置多条：本特性 IMS 信令通常 TCP(6)+UDP(17) 双协议, 需多次执行本命令配置两条分类器(任务示例 PRIORITY=1/PROTOCOL=6 + PRIORITY=2/PROTOCOL=17), 属迭代配置非配法分叉。
    (8) 缺口冷门参数：SRCIPV4SPECTYPE/SRCIPV6*/SRCPORTSPECTYPE/DST*/PROSPECTYPE 共 15 个命令真相标 optional/conditional 且 1 特性数据规划表均未用到——主特性仅用 IPV4 SRC path, 按通用配置门槛不绑, *SPECTYPE 系列采用默认 ANY/SPECIFY 隐式表达；若后续 IPV6 IMS 信令识别特性启用, 须新建独立 atom 覆盖 V6SRC* 参数。
violation_effect: 上限超限→ADD 失败；规则不全→IMS 信令报文无法命中→语音不通；非IMS APN 配置→干扰 IMS 识别；PRIORITY 同 APN 冲突→ADD 失败；未先建APN→APN引用失败
severity: warning
rule_expression_mode: inferred
rule_source_kind: command
status: inferred
source_evidence_ids: [GWFD-020251/配置VoLTE基础语音业务_65928706.md]
notes: "命令级审查(2026-07-02)新增 rule。属 atom-level dependency_rule。投影命令 notes 5 大约束(cardinality 64000/仅新激活用户/高危命令/APN 仅 IMS/PRIORITY 同 APN 唯一)+ 隐式前置(ADD APN 0-00020) + 多次执行模式注。"