rule_id: UDG@20.15.2@TaskRule@0-00348
owner_task_ref: UDG@20.15.2@Task@0-00175
rule_name: 0-00175 SET APNDLLTBUFFER cardinality 10000 + 新数据流 + 下行缓存>15s触发 + 系统初始 + 前置ADD APN
rule_type: dependency_rule
rule_scope: atom
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: requires
  target_refs:
    - UDG@20.15.2@Task@0-00175
  expression: |
    SET APNDLLTBUFFER(atom 0-00175) 配置约束：
    (1) 上限：单命令最大记录数为 10000(命令 notes 强约束——整机最多 10000 条)；超限→SET 失败。
    (2) 新数据流生效：该命令执行后对新数据流生效(命令 notes)。
    (3) 下行缓存时长联动：在下行缓存时长超过 15 秒时生效(命令 notes 强约束)；下行缓存时长 <15 秒时, 默认下行缓存报文数量为 128 个(命令 notes 隐式默认)——本命令与 atom 0-00174 SET APNDLBUFTIME 必须协调, 缓存时长>15s 是长时间缓存生效前提。
    (4) 系统初始记录：MAXBUFFERNUM=1, BUFFERMODE=BUFF_MODE_RING(命令 notes)；本 atom 跨 3 特性绑齐 MAXBUFFERNUM/BUFFERMODE, BUFFERMODE 跨特性取值分叉→DP 0-00137 编排(RING/CHAIN 2-way)。
    (5) 仅 APN 生效：生效范围限于 APN(命令隐式)；与 atom 0-00173 SET GLBDLLTBUFFER 优先级 APN>全局。
    (6) 前置依赖：APN 必须先通过 ADD APN(atom 0-00020) 配置, 否则 SET 命令 APN 引用失败。
    (7) MAXBUFFERNUM 取值范围 1~64 包数(命令真相)。
    (8) SMF 协同：MAXBUFFERNUM 与 SMF 下发 DL Buffering Packet Count 取最小值(命令 notes 隐式语义)；若 SMF 未下发, 用本参数。
violation_effect: 上限超限→SET 失败；缓存时长<15s→本配置不生效但占 128 个默认缓存；未先建APN→APN引用失败；MAXBUFFERNUM 超范围→SET 失败；BUFFERMODE 错配→缓存行为不符
severity: warning
rule_expression_mode: inferred
rule_source_kind: command
status: inferred
source_evidence_ids: [GWFD-110601/激活NB-IoT eDRX模式_67487577.md, GWFD-110641/激活eMTC eDRX模式_70722748.md, GWFD-110661/激活5G eDRX模式_58609938.md]
notes: "命令级审查(2026-07-02)新增 rule。属 atom-level dependency_rule。投影命令 notes 5 大约束(cardinality 10000/新数据流生效/缓存时长联动/系统初始/SMF 协同)+ 隐式前置(ADD APN)+ DP 0-00137 编排联动。"