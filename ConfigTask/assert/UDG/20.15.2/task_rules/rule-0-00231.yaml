notes: "命令级审查(2026-07-02) 新建。投影自命令 notes: 规格 2048 + SERVICENAME 前置依赖 AUTOSCALINGSERVICE(0-00141) + 动态 BFD 前置依赖 AUTOSCALINGSRBFD(0-00144) + 立即生效 + IPv4/IPv6 掩码范围。6 缺口中 PREFIX6/NEXTHOPALLOCTYPE6/NEXTHOP6 为 IPv6 变体（路由交叉当前用 IPv4）+ PREFERENCE/TAG/DESCRIPTION 冷门 optional，均不绑。BFDTEMPLATENAME 由 binding decision_ref=0-00024 表达其 conditional requiredness，DP 0-00024 跨 atom 编排决定 BFD 类型与 BFDTEMPLATENAME 填写。"
