constraint:
  constraint_type: required_predecessor
  target_refs:
    - UDG@20.15.2@MMLCommand@ADD AUTOSCALINGSRROUTE
  expression: |
    ADD AUTOSCALINGSRROUTE 命令最大记录数为 2048。
    依赖参数 SERVICENAME 值相同的 ADD AUTOSCALINGSERVICE（0-00141）已经配置（引用关系已由 SERVICENAME binding 的 source_ref=0-00141:SERVICENAME 表达）。
    如使能了动态 BFD（DP 0-00024 取 opt-bfd-two-way），依赖参数 SERVICENAME 值相同的 ADD AUTOSCALINGSRBFD（0-00144）已配置。
    如 DP 0-00024 取 opt-bfd-one-arm，BFDTEMPLATENAME 须填且引用 ADD AUTOSCALINGBFD.TEMPLATENAME（0-00143）（引用关系已由 binding source_ref 表达）。
    IPv4 路由掩码长度 0~32，IPv6 路由掩码长度 0~128（取值范围由 CommandParameter 校验承担）。
    该命令执行后立即生效。
violation_effect: 超规格（>2048）新增失败；前置 SERVICENAME 未配置则报错；BFD 模板不匹配则忽略
