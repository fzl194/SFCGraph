rule_id: UDG@20.15.2@TaskRule@0-00173
owner_task_ref: UDG@20.15.2@Task@0-00060   # 挂 atom SET IFIPV6ENABLE
rule_name: SET IFIPV6ENABLE 缺省不使能 + MTU 取较大值行为
rule_type: state_invariant_rule
rule_scope: parameter
condition: {expression_type: none, expression: ""}
constraint:
  constraint_type: behavior_constraint
  target_refs:
    - UDG@20.15.2@MMLCommand@SET IFIPV6ENABLE
  expression: "缺省情况下接口不使能 IPv6；该命令仅在 VNRS_VNFC 的 Ethernet 接口/子接口/Eth-Trunk 接口/子接口/Loopback/Tunnel 口生效；若 IPv4 MTU 与 IPv6 MTU 同时配置，实际取两者较大值下发至 vNic。"
violation_effect: 未显式 SET IFIPV6ENABLE 的接口 IPv6 不生效；IPv4/IPv6 MTU 同配时实际生效值为较大值（与直觉不同，需注意）
severity: info
rule_expression_mode: explicit
rule_source_kind: config
status: inferred
source_evidence_ids:
  - GWFD-010107/激活静态地址用户路由冗余_19612403.md
  - GWFD-020402/激活N6_Gi_SGi接口IPv6组网_64500399.md
notes: "命令级审查(2026-07-02): 投影自命令 notes '缺省不使能 IPv6' + 'IPv4/IPv6 MTU 同配取较大值' + '仅 VNRS_VNFC 部分接口类型生效'。记录使能前置依赖（需先 SET IFIPV6ENABLE 才能配 ADD IFIPV6ADDRESS）与 MTU 取大值这一非直觉行为。"
