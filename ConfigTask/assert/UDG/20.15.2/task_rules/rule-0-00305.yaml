rule_id: UDG@20.15.2@TaskRule@0-00305
owner_task_ref: UDG@20.15.2@Task@0-00027
rule_name: 0-00027 LOADMODE/VERSION 配套 + 跨特性取值 + 上传+升级约束
rule_type: dependency_rule
rule_scope: atom
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: requires
  target_refs:
    - UDG@20.15.2@Task@0-00027
  expression: |
    LOD SIGNATUREDB(atom 0-00027) 配置约束：
    (1) LOADMODE 跨特性取值分叉：LATEST(020359/110352/110281/110203 共 3 特性) / SPECIFIC(110283/110404 共 2 特性)——binding 当前 variable:local_planned（命令参数表 数据来源=本端规划），各特性按自身语义选择；不强制 decision_driven 因本端规划来源一致（同 atom 跨特性取值分叉而非来源分叉，§B 已确认）。
    (2) VERSION 配套：LOADMODE=SPECIFIC 时 VERSION 必选(命令真相 conditional)；LOADMODE=LATEST 时 VERSION 不选——本 atom 当前 binding VERSION requiredness=conditional 已正确投影。
    (3) 立即生效(命令 notes 强约束)。
    (4) 升级不中断业务：升级知识库文件不中断和影响业务(命令 notes)。
    (5) 上传通道：新增知识库通过网管/MAE 的"网元文件传输"或 OM Portal 的"文件传输"功能上传库文件(命令 notes)。
    (6) 协议一致性约束：待更新知识库文件相比当前使用版本，不允许删除协议或修改协议名称；如发生上述变更需确保加载新文件前已删除/修改相关配置(命令 notes 强约束)——违规会导致新库加载失败。
    (7) 旧版本警告：系统未加载协议特征库文件，将无法进行七层协议解析业务；加载旧版本的知识库文件可能会[导致不可预期行为](命令 notes)。
    (8) 加载时长：特征库文件加载约 5 分钟(0-00027 notes 已记录)；加载后需 DSP SIGNATUREDB 验证。
    (9) 与 LOD PARSERDB(0-00152 解析库) 配套(IM 场景)：两命令仅 LOADMODE 参数，配套使用。
violation_effect: VERSION 缺配但 LOADMODE=SPECIFIC→ADD 拒收；上传通道错选→文件不可达；协议变更未清理→新库加载失败
severity: warning
rule_expression_mode: inferred
rule_source_kind: feature
status: inferred
