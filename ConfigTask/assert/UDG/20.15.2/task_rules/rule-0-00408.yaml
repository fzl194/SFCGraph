  expression: "SET IPALLOCRULE 命令最大记录数为 1(全局唯一实例，非 per-APN)。支持三种地址分配规则优先级配置；不同优先级的规则不可以配置为相同；三级优先级独立配置，配置低优先级时不要求必须配置高优先级。全局默认第一优先级开关使能、第一优先级规则为基于 APN 映射的地址范围分配地址，第二/三优先级规则开关不使能。命令执行后只对新激活用户生效。"
