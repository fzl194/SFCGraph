notes: "命令级审查(2026-07-02) 补审新建。投影自命令 notes '最大记录数为1'+'支持三种地址分配规则优先级'+'不同优先级规则不可相同'+'三级独立配置'+'全局默认第一级使能'+'只对新激活用户生效'。入不转板场景(GWFD-020482)取第一级 APN 映射、二三级不使能。FIRSTRULE 位域格式 APN-{0|1}&LOCATION-{0|1}&SMF-{0|1}。"
