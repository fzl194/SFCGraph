rule_name: ADD PCCACTIONPROP 上限 200 + 立即生效 + 名称唯一 + 上下行门控一致性
rule_type: spec_rule
rule_scope: task
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: capacity_limit
  target_refs:
    - UDG@20.15.2@Task@0-00028
  expression: |
    ADD PCCACTIONPROP 命令最大记录数为 200。
    立即生效：本命令执行后立即生效。
    默认行为：如果上行或下行发起业务的相应策略没有配置，则按照默认 Pass 处理。
    一致性约束：报文动作需要上下行都配置且保持一致，配置不一致可能导致业务不通。
    唯一性约束：PCCACTPROPNAME 全局唯一，不同 PCC 动作属性之间该参数不能重复。
    门控枚举：UPINITUPGATE/UPINITDNGATE/DNINITUPGATE/DNINITDNGATE = PASS | DISCARD（默认 PASS）。
    适用 NF：PGW-U、UPF。
    协同约束：PCCACTPROPNAME 产出对象被 ADD SRVPBINDPCCPG(0-00030) 的 PCCACTPROPNAME 引用——必须先建 PCC 动作属性才能在策略组业务属性绑定中引用。
violation_effect: 超 200 上限新增失败；PCCACTPROPNAME 重复导致冲突；上下行门控不一致导致业务不通
