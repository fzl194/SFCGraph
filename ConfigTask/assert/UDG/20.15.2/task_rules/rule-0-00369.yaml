condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: capacity_limit
  target_refs:
    - UDG@20.15.2@Task@0-00135
  expression: |
    ADD L2TPCLIENTIP 命令最大记录数 1500。
    每个 L2TP 组只能绑定 1 个源端 Gi 接口（GROUPID 唯一索引，唯一性约束）。
    立即生效：本命令执行后立即生效。
    前置依赖：必须先 ADD L2TPGROUP(0-00133, 提供 L2TP 组索引) 和 ADD LOGICINF(0-00083, 提供 Giif 接口)。
    适用 NF：PGW-U、UPF。
    本地配置方式专属：AAA 下发方式用 ADD L2TPRDSCLIENT(0-00134) 绑 APN 到接口。
violation_effect: 超 1500 上限新增失败；同 L2TP 组重复绑接口导致源端冲突；未先 ADD L2TPGROUP/LOGICINF 则无引用源
