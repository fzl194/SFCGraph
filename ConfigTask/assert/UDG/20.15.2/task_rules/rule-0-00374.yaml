rule_id: UDG@20.15.2@TaskRule@0-00374
owner_task_ref: UDG@20.15.2@Task@0-00084   # 挂 atom SET DDOS
rule_name: SET DDOS 全局唯一 + 立即生效 + 系统初始记录 + DDOSCHECK 协同
rule_type: spec_rule
rule_scope: task
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: capacity_limit
  target_refs:
    - UDG@20.15.2@Task@0-00084
  expression: |
    SET DDOS 命令最大记录数为 1（全局唯一实例，DDoS 防护阈值统一设置）。
    立即生效：本命令执行后立即生效。
    系统初始记录：存在系统初始记录，初始值为 THRESHOLD=100。
    取值范围：THRESHOLD 整数 1~10000。
    行为约束：使能该命令时，如果 THRESHOLD 参数配置过小，会影响用户新建流速率，建议使用默认值。
    协同约束：本命令只设全局阈值，DDOS 防护由 ADD USERPROFILE.DDOSCHECK(0-00011) 决定哪个 UserProfile 启用防护；DDOSCHECK=ENABLE 的 UserProfile 才受 THRESHOLD 约束。
    适用 NF：SGW-U、PGW-U、UPF。
violation_effect: 重复执行覆盖前值；阈值过小影响用户新建流速率；DDOSCHECK 未启用则阈值不生效
severity: warning
rule_expression_mode: explicit
rule_source_kind: config
