rule_name: PDN侧路由探测执行前置与时序约束
rule_type: sequencing_rule
rule_scope: parameter
condition: {expression_type: none, expression: ""}
constraint:
  constraint_type: execution_constraint
  target_refs:
    - UDG@20.15.2@MMLCommand@STR PDNROUTETST
  expression: "探测执行须满足：(1) 同一时间只能执行一个探测命令，并发执行后者会失败；(2) 探测前需确定地址池(IPPOOL)下有可探测地址，否则探测失败；(3) DSTIPV4ADDR 须配置有效目的IP(非广播/非全0)，否则探测失败；(4) 多次执行只保留最后一次结果；(5) Tracert 方式约 450s 返回且不支持全量探测(WHOLEDETECT)。"
violation_effect: 探测失败 / 结果丢失 / Tracert 长时间占用
severity: warning
rule_expression_mode: explicit
rule_source_kind: config
status: inferred
