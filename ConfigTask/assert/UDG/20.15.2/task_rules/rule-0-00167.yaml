notes: "命令级审查(2026-07-02): 投影自命令 notes 5 条执行约束（并发互斥/地址池前置/目的IP有效/仅留末次/Tracert耗时）。探测为运行态激活动作，建议空载环境使用。时序互斥由命令运行态保证，非配置态去重。"
