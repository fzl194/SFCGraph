rule_type: spec_rule
rule_scope: task
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: capacity_limit
  target_refs:
    - UDG@20.15.2@Task@0-00011
  expression: |
    最大记录数随 UPSPECTYPE 变化：DEFAULT(或未指定)=5000；SPECIFICATION_LIMITED=100000。两类配置记录总数规格合计 105000，>90% 上报 ALM-135602215 告警，阈值可由 MOD CFGTHRESHOLD 修改。
