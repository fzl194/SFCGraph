notes: "命令级审查(2026-07-02)新增 rule。属 atom-level dependency_rule。投影命令 notes 5 大约束(cardinality 10000/立即生效/高危命令/SIP解析影响性能/filter依赖) + 隐式前置(ADD APN 0-00020) + 配套前置(ADD APNIMSSIGFLTR 0-00155) + IMSSWITCH=ENABLE 固定约束。"