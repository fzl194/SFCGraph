rule_id: UDG@20.15.2@TaskRule@0-00356
owner_task_ref: UDG@20.15.2@Task@0-00156
rule_name: 0-00156 SET APNIMSATTR cardinality 10000 + 立即生效 + 高危 + SIP解析影响性能 + filter依赖ADD APNIMSSIGFLTR + 前置ADD APN
rule_type: dependency_rule
rule_scope: atom
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: requires
  target_refs:
    - UDG@20.15.2@Task@0-00156
    - UDG@20.15.2@Task@0-00020
    - UDG@20.15.2@Task@0-00155
  expression: |
    SET APNIMSATTR(atom 0-00156) 配置约束：
    (1) 上限：单命令最大记录数为 10000(命令 notes 强约束——整机最多 10000 条 ApnImsAttr)；超限→SET 失败。
    (2) 立即生效：该命令执行后立即生效(命令 notes)。
    (3) 高危命令：本命令属于高危命令, 该操作会配置 APN 的 IMS 属性, 可能会影响用户的 VoLTE 业务(命令 notes 警告)。
    (4) SGW-U/I-UPF 性能影响：使能 ApnImsAttr 配置会触发 PF 的 SIP 信令解析, 可能影响性能(命令 notes 强约束)。
    (5) PGW-U/PSA-UPF 性能影响：如果数据 APN 下发有 QCI 为 5 的业务承载, 会触发 PF 的 filter 匹配和 SIP 信令解析, 可能会影响性能(命令 notes 强约束)。
    (6) filter 匹配依赖：filter 匹配依赖 ADD APNIMSSIGFLTR(atom 0-00155) 配置, 如果配置错误, 可能影响 IMS 业务(命令 notes 强约束)——本 atom 必须配套 0-00155 IMS 信令分类器先建。
    (7) 前置依赖：APN 必须先通过 ADD APN(atom 0-00020) 配置, 否则 SET 命令 APN 引用失败。
    (8) IMSSWITCH=ENABLE 固定：本特性(VoLTE 基础语音业务)IMSSWITCH 固定 ENABLE——VoLTE 信令承载前置开关, 不允许关闭。
violation_effect: 上限超限→SET 失败；未配套 0-00155→filter 匹配失败→IMS 业务异常；未先建APN→APN引用失败；高并发场景下性能影响→用户感知差
severity: warning
rule_expression_mode: inferred
rule_source_kind: command
status: inferred
