rule_id: UDG@20.15.2@TaskRule@0-00253
owner_task_ref: UDG@20.15.2@Task@0-00036   # 挂 atom ADD BWMCONTROLLER
rule_name: ADD BWMCONTROLLER 最大记录数 + 90%阈值告警 + 立即生效 + 每服务1控制器
rule_type: cardinality_rule
rule_scope: parameter
condition: {expression_type: none, expression: ""}
constraint:
  constraint_type: max_records
  target_refs:
    - UDG@20.15.2@MMLCommand@ADD BWMCONTROLLER
  expression: |
    ADD BWMCONTROLLER 命令最大记录数为 2000。
    当配置记录数大于规格的 90% 时，会上报 "ALM-135602215 配置数量超阈值" 告警；
    当配置记录数小于等于规格 90% 时，恢复告警；阈值可通过 MOD CFGTHRESHOLD 修改。
    该命令执行后立即生效。
    BwmController 命令定义一套业务控制动作模板，只有被绑定在 BwmRule 下才会产生实际控制作用（模板与实例解耦）。
    一个 BwmService 只能绑定一个 BwmController（per-service-per-controller 单映射，BwmRule 的 UPBWMCTRLNAME1/DNBWMCTRLNAME1 引用 BWMCNAME 隐式表达）。
violation_effect: 超规格（>2000）新增失败；同一 Service 重复绑不同 Controller 引用冲突
severity: warning
rule_expression_mode: explicit
rule_source_kind: config
status: inferred
source_evidence_ids:
  - GWFD-020354/针对URL应用基于用户的流量整形配置_83195646.md
  - GWFD-110301/激活基于终端系统的码率差异化控制_69722139.md
  - GWFD-110313/激活基于智能Shaping的组级带宽控制_76107785.md
notes: "命令级审查(2026-07-02) 新建（独占段 0-00250~0-00259）。投影自命令 notes '最大记录数为2000' + '执行后立即生效' + '只有被绑定在BwmRule下才会产生实际控制作用'。每服务1控制器的引用关系由 0-00037:UPBWMCTRLNAME1/DNBWMCTRLNAME1 source_ref=0-00036:BWMCNAME 显式串联。"