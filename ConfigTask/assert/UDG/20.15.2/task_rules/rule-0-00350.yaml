rule_id: UDG@20.15.2@TaskRule@0-00350
owner_task_ref: UDG@20.15.2@Task@0-00110
rule_name: 0-00110 SET APNREPORTATTR cardinality 10000 + 每APN一条 + 立即生效 + 修改PERF前去活 + 前置ADD APN
rule_type: dependency_rule
rule_scope: atom
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: requires
  target_refs:
    - UDG@20.15.2@Task@0-00110
  expression: |
    SET APNREPORTATTR(atom 0-00110) 配置约束：
    (1) 上限：单命令最大记录数为 10000(命令 notes 强约束——整机最多 10000 条 ApnReportAttr)；超限→SET 失败。
    (2) 唯一性：每个 APN 支持一条配置(命令 notes 强约束)；重复 SET 同 APN→覆盖。
    (3) 立即生效：该命令执行后立即生效(命令 notes)。
    (4) 修改 PERF 前去活：修改此命令的 perf 统计 APN 之前, 先去活原来的 APN 下的所有用户(命令 notes 强约束)——PERFORMANCE 字段更新须先保户全部去活。
    (5) APN 类型与 REQUESTED 联动：当 HEADERENRICH/PERFORMANCE/SERVICEREPORT/CONGESTIONRPT 任一取 REQUESTED 时, 涉及别名 APN 与真实 APN 映射(命令 notes 详细说明)；本特性 CONGESTIONRPT 固定 ENABLE, 主机特性场景下其他 3 字段保持 SERVICE 默认。
    (6) 前置依赖：APN 必须先通过 ADD APN(atom 0-00020) 配置, 否则 SET 命令 APN 引用失败；CONGESTIONRPT=ENABLE 要求 RAN 侧和 PCRF 同时支持(特性 md GWFD-110332 注)。
    (7) 跨 APN 类型处理：UPF 支持虚拟 APN/别名 APN/普通 APN(命令 notes)；别名 APN 不是真实 APN, REQUESTED 类型时系统自动解析到对应真实 APN。
violation_effect: 上限超限→SET 失败；同 APN 重复 SET→覆盖；PERFORMANCE 变更未先去活→perf 统计错误；未先建 APN→APN 引用失败；REQUESTED 类型时别名 APN 映射错→上报统计到错 APN
severity: warning
rule_expression_mode: inferred
rule_source_kind: command
status: inferred
source_evidence_ids: [GWFD-110332/激活基于小区负荷上报的无线资源优化_30927860.md]
notes: "命令级审查(2026-07-02)新增 rule。属 atom-level dependency_rule。投影命令 notes 5 大约束(cardinality 10000/唯一性/立即生效/修改前去活/APN 类型映射)+ 隐式前置(ADD APN)。"