notes: "命令级审查(2026-07-02) 新建。投影自命令 notes: 规格 4096 + 地址池 2048 上限 + VNICID 范围 + 立即生效 + 自动化配置开关前置(SET AUTOCONFIG 关闭/开启两步)。VNICID 取值范围（1~4294967295）由 CommandParameter 校验承担。26 缺口中 IPALLOCTYPE4 已在 atom 显式绑（md 脚本 L162 SR-IOV bonding 示例显式 USER_CONFIG），其余 25 均为冷门 optional 无特性用到（OSPF 族路由交叉不用 + TPIN/TPOUT 流量策略 + MTU + FLOWMODE + NETWORKINSTID + ISBACKUP + TRUSTUPSTREAM + OSPFGRPENABLE + OSPFGRPID + ADDRMODE + BEGIN/ENDADDR6 IPv6 变体）。"
