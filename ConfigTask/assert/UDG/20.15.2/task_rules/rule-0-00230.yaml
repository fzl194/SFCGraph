rule_name: ADD AUTOSCALINGSERVICE 规格 + 地址池上限 + VNICID 范围 + 立即生效 + 自动化配置开关前置
rule_type: cardinality_rule
rule_scope: command
condition: {expression_type: none, expression: ""}
constraint:
  constraint_type: max_records
  target_refs:
    - UDG@20.15.2@MMLCommand@ADD AUTOSCALINGSERVICE
  expression: |
    ADD AUTOSCALINGSERVICE 命令最大记录数为 4096。
    地址池范围（BEGINADDR*/ENDADDR*）不能超过 2048。
    设置 VNICID 时须保证取值在设备物理主接口号有效范围内（命令枚举，规则由参数级 validates 取值范围承担）。
    该命令执行后立即生效。
    该命令在自动化配置开关为关闭的状态下才能执行（前置 SET AUTOCONFIG 关闭 → 执行 → SET AUTOCONFIG 开启）。
violation_effect: 超规格（>4096）新增失败；地址池超 2048 失败；VNICID 越界失败
