rule_id: UDG@20.15.2@TaskRule@0-00282
owner_task_ref: UDG@20.15.2@Task@0-00066
rule_name: 0-00066 最大记录数 8 + 系统预置默认域(default/5p3d)
rule_type: dependency_rule
rule_scope: atom
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: requires
  target_refs:
    - UDG@20.15.2@Task@0-00066
  expression: |
    ADD QOSDIFFERSERV(atom 0-00066) 配置约束：
    (1) 上限：系统最大记录数为 8(命令 notes 强约束)。
    (2) 系统预置：默认存在两个 DiffServ 域(default 与 5p3d)，其中 5p3d 域不允许修改(IPFD-012001 md 操作步骤说明)——本 atom 在主场景示例 DSNAME=default 即利用预置域；自建域须避开 5p3d。
    (3) DSNAME 是 SET QOSBA(0-00067)/SET QOSPHB(0-00069)/ADD QOSIFTRUST(0-00068) 三 atom 的链路引用键——DSNAME 改名将导致下游引用断链(可通过 SEARCH INSTRUMENTATION 模式追加)。
    (4) 该命令执行后立即生效(命令 notes)。
violation_effect: 上限超限→ADD 失败；DSNAME 取 5p3d→MOD 命令拒收；DSNAME 改名→下游 SET QOSBA/SET QOSPHB/ADD QOSIFTRUST 找不到域导致失败
severity: warning
rule_expression_mode: inferred
rule_source_kind: feature
status: inferred
source_evidence_ids: [GWFD-010201/配置QoS与流量管理_03345155.md, IPFD-012001/激活QoS简单流分类特性（VNRS_VNFC）_13119472.md]
notes: "命令级审查(2026-07-02)新增 rule。属 atom-level dependency_rule。default/5p3d 双预置域在 IPFD-012001 md § L82 '说明' 显式标注。"
