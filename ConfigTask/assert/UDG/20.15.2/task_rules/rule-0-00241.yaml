rule_name: ADD ROUTEPOLICYNODE 最大记录数 + 节点唯一性 + 前置 ADD ROUTEPOLICY + 立即生效
rule_type: cardinality_rule
rule_scope: parameter
condition: {expression_type: none, expression: ""}
constraint:
  constraint_type: max_records
  target_refs:
    - UDG@20.15.2@MMLCommand@ADD ROUTEPOLICYNODE
  expression: |
    ADD ROUTEPOLICYNODE 命令最大记录数为 65535。
    添加该路由策略节点时，要保证该（POLICYNAME+NODESEQUENCE）节点未添加过（同策略下节点号唯一）。
