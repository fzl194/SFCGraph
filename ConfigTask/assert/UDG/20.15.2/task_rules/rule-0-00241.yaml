notes: "命令级审查(2026-07-02) 新建（独占段 0-00240~0-00249）。投影自命令 notes '最大记录数65535' + '保证该路由策略节点未添加过'(节点唯一) + '保证通过ADD ROUTEPOLICY添加过指定的路由策略的名字'(前置依赖) + '立即生效'。前置 ADD ROUTEPOLICY 的顺序约束已由 POLICYNAME binding 的 source_ref=0-00111:POLICYNAME(reference) 隐式表达，本 rule 显式记录节点唯一性规格。"
