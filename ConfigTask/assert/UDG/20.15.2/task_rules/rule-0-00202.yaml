rule_id: UDG@20.15.2@TaskRule@0-00202
owner_task_ref: UDG@20.15.2@Task@0-00080   # 挂 atom ADD OSPFV3IMPORTROUTE
rule_name: OSPFv3引入路由前置/WLR全量发布约束
rule_type: constraint_rule
rule_scope: parameter
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: execution_constraint
  target_refs:
    - UDG@20.15.2@CommandParameter@ADD OSPFV3IMPORTROUTE:PROCID
    - UDG@20.15.2@CommandParameter@ADD OSPFV3IMPORTROUTE:PROTOCOL
    - UDG@20.15.2@CommandParameter@ADD OSPFV3IMPORTROUTE:TOPOID
    - UDG@20.15.2@CommandParameter@ADD OSPFV3IMPORTROUTE:ROUPOLINAME
  expression: "ADD OSPFV3IMPORTROUTE 须满足：(1) 前置——必须先执行 ADD OSPFV3 配置了 OSPFv3 进程(PROCID)才能使用此命令；(2) 命令最大记录数8000；(3) 采用路由策略方式发布路由时(指定 ROUPOLINAME)，PROTOCOL 不能只选 WLR_SP 或 WLR_UD，必须选 WLR 方式发布所有路由(020401 md 说明)；(4) 不指定 ROUPOLINAME 时按 PROTOCOL=wlr 全量发布；(5) IMPTCOSTCFG/IMPTTAGCFG/IMPTTYPECFG 为引入路由开销/标签/类型的配置开关(默认FALSE=不配置,010155 脚本显式传 FALSE 等同默认空操作)。"
violation_effect: 路由引入失败 / 发布路由不全 / 进程未创建报错
severity: critical
rule_expression_mode: explicit
rule_source_kind: command
status: inferred
source_evidence_ids:
  - GWFD-010155/配置PGW-U到Untrusted Non-3GPP GW的数据（OSPFv3动态路由+IPv6 BF_4baebda6_72490128.md
  - GWFD-020401/激活IPv6承载上下文_38276176.md
  - GWFD-020406/激活外部网元地址分配的IPv6 Prefix Delegation功能_80269177.md
notes: "命令级审查(2026-07-02) 新建。IPv4 ADD OSPFIMPORTROUTE(rule 0-00193) 的 OSPFv3 镜像。投影自命令 notes(前置 ADD OSPFV3/记录8000) + ③GWFD-020401 md 说明 '不能只选发布WLR_SP或WLR_UD，必须WLR发布所有路由'(PROTOCOL 取值约束 critical,仅路由策略方式发布时生效)。TOPOID 已补绑(3特性脚本均显式=0)。ROUPOLINAME 已补绑(020401 用 policy1 路由策略发布)。IMPTCOSTCFG/IMPTTAGCFG/IMPTTYPECFG 不绑参(③仅 010155 脚本显式传 FALSE=默认空操作,020401/020406 未含,按通用配置筛不绑),但作为引入路由开销/标签/类型配置开关记此约束。"
