constraint:
  constraint_type: required_predecessor
  target_refs:
    - UDG@20.15.2@MMLCommand@ADD AUTOSCALINGSRBFD
  expression: |
    ADD AUTOSCALINGSRBFD 命令最大记录数为 2048。
    依赖参数 SERVICENAME 值相同的 ADD AUTOSCALINGSERVICE（0-00141）已经配置（引用关系已由 SERVICENAME binding 的 source_ref=0-00141:SERVICENAME 表达）。
    该命令在自动化配置开关为关闭的状态下才能执行（前置 SET AUTOCONFIG 关闭 → 执行 → SET AUTOCONFIG 开启）。
    使用此命令前必须先要全局使能 BFD 功能。
    配置了使能 BFD 且参数 SERVICENAME 相同的静态路由（0-00142）须同步生效。
    该命令执行后立即生效。
violation_effect: 超规格（>2048）新增失败；SERVICENAME 前置未配置则报错；自动化配置开关未关闭则报错；BFD 未全局使能则报错
