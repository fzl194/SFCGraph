owner_task_ref: UDG@20.15.2@Task@0-00132   # 挂 atom SET APNL2TPATTR
rule_name: SET APNL2TPATTR 上限 + 立即生效 + 系统初始记录 + 前置 ADD APN
rule_type: spec_rule
rule_scope: task
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: capacity_limit
  target_refs:
    - UDG@20.15.2@Task@0-00132
  expression: |
    系统最多支持配置 10000 条 ApnL2tpAttr，每 APN 一条（APN 唯一索引）。
    立即生效：本命令执行后立即生效。
    系统初始记录：存在系统初始记录，初始值为 L2TPSWITCH=DISABLE / L2TPGROUPID=NULL / RDSLNSMODE=NULL / ICRQ_CALLINGNO=NULL / ICCN_AUTH=DISABLE / IPCP_NEGO=DISABLE / ICCN_PGROUPID=DISABLE / ICCN_TXSPEED=DISABLE / ICRQ_BEARER=DISABLE / ICCN_LCPNEGO=DISABLE / DOMAINNAMEACT=DISABLE / DOMAINNAMEPOS=NULL / SUPPORTIPV6=DISABLE。
    互斥约束：AAA 方式填 RDSLNSMODE 不填 L2TPGROUPID；本地方式填 L2TPGROUPID 不填 RDSLNSMODE（由 DP 0-00023 L2TP激活方式 决定）。
    适用 NF：PGW-U、UPF。
violation_effect: 超规格新增失败；未先 ADD APN 则无 APN 索引可绑
severity: warning
rule_expression_mode: explicit
rule_source_kind: config
