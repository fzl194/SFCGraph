rule_name: 0-00174 SET APNDLBUFTIME cardinality 10000 + 立即生效 + 系统初始 6s + 仅APN生效 + 前置ADD APN
rule_type: dependency_rule
rule_scope: atom
condition: {expression_type: always, expression: ""}
constraint:
  constraint_type: requires
  target_refs:
    - UDG@20.15.2@Task@0-00174
  expression: |
    SET APNDLBUFTIME(atom 0-00174) 配置约束：
    (1) 上限：单命令最大记录数为 10000(命令 notes 强约束——整机最多 10000 条 ApnDLBufTime)；超限→SET 失败。
    (2) 立即生效：该命令执行后立即生效(命令 notes)。
    (3) 系统初始记录：NORMALUSER/NBIoTUser/REDCAPNRUSER 初始均=6s(命令 notes)；本 atom 跨 3 特性(NB-IoT/eMTC/5G)绑齐 3 个时长参数, 各 1 特性用。
    (4) 仅 APN 生效：此命令的生效范围限于APN(命令 notes)；与 atom 0-00172 SET GLBDLBUFTIME 优先级 APN>全局。
    (5) 前置依赖：APN 必须先通过 ADD APN(atom 0-00020) 配置, 否则 SET 命令 APN 引用失败(命令隐式)。
    (6) 时长参数取值范围：NORMALUSER 3~15s, NBIOTUSER/REDCAPNRUSER 3~200s(命令真相)。
    (7) DP 0-00136 编排 USER-TYPE 三选一(NBIOTUSER/NORMALUSER/REDCAPNRUSER 互斥, 按特性路由)——本 atom 单次 SET 仅配一种用户类型时长。
violation_effect: 上限超限→SET 失败；未先建APN→APN引用失败；时长超范围→SET 失败；3 时长混传→命令拒收(应按特性路由单选)
severity: warning
