notes: "命令级审查(2026-07-02)新增 rule。属 atom-level dependency_rule。投影命令 notes 4 大约束(cardinality 10000/立即生效/系统初始/仅APN生效)+ 隐式前置(ADD APN)+ DP 0-00136 编排联动。"