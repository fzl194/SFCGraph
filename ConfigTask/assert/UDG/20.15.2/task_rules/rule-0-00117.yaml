    - UDG@20.15.2@Task@0-00001
  expression: "默认配额功能开启(DFTQTSWITCH=ENABLE)依赖已配置 DefaultQuota 的配额大小——应提前使用 ADD/MOD URR（设默认配额，对应 DFTQUOTAVOLUME/DFTQUOTATIME）和 SET SRVCOMMONPARA 设置默认配额的大小。否则开关使能后无可用默认配额。"
