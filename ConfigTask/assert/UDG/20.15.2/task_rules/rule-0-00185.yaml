  expression: 本命令属高危命令。全局去使能 BFD(BFDENABLE=FALSE)后，BFD 所有历史配置全部删除且无法恢复；若有业务在使用 BFD 功能，可能导致去使能失败。除使能 BFD(BFDENABLE=TRUE)外，去使能操作须谨慎并联系华为技术支持。
