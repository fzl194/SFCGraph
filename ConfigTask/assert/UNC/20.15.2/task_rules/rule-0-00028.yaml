rule_id: UNC@20.15.2@TaskRule@0-00028
owner_task_ref: UNC@20.15.2@Task@0-00026
rule_name: ADD DIAMPEERADDR 最多 510 条 + 单主机地址数上限 + 主机必须已存在
rule_type: cardinality_rule
rule_scope: task
condition: {expression_type: none, expression: ""}
constraint:
  constraint_type: max_count
  target_refs: [UNC@20.15.2@MMLCommand@ADD DIAMPEERADDR]
  expression: >-
    记录数 ≤ 510；命令执行后立即生效。
    单个 PCRF/OCS/DRA 主机：≤20 个 IPv4/IPv6 地址 或 ≤20 个 SCTP 端点；
    单个 Diameter AAA 主机：≤2 个 IPv4/IPv6 地址 或 ≤2 个 SCTP 端点。
    前置：HOSTNAME 指向的对端 Diameter 主机必须已存在（ADD PCRF/ADD OCS/ADD DRA/ADD DIAMETERAAA 已配置）。
    互斥：同一 DRA 不允许同时配置 IP 地址与 SCTP 端点。
  # ADDRTYPE 分叉下游参数集 → 见 dp-0-00002
violation_effect: 超规格/主机不存在/同主机 IP+SCTP 混配均无法新增
severity: warning
rule_expression_mode: explicit
rule_source_kind: config
status: inferred
