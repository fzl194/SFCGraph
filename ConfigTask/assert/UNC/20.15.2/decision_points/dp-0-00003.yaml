notes: |
  schema L670 明示"在线、离线、融合计费选择"为 DecisionPoint 典型用例——原 atom 把 ONLINE/OFFLINE/CONVERGED
  当 3 个独立 variable 参数是错的，三选一互斥，实为同一决策的三个使能位。
  跨命令传播：在线→OCS 链路族（DIAMPEERADDR/DIAMCONNGRP 等）；离线→CG 族；融合→CCT+URRGROUP。
  与 ADD URR 的 dp-0-00001（URR 上报模式）关联：CHARGEMETHOD 定用户级方式，URR 定该 URR 上报粒度，
  二者结果须一致 → rule 0-00017 consistency。
