notes: |
  UNC atom batch3（2026-07-06），手写自证据包 ADD_DIAMPEERADDR.md（8 特性用，6 参）—— Diameter 族叶节点命令。
  ADDRTYPE 为模式开关（IPv4/IPv6/SCTP），分叉下游地址参数集 → 决策点 dp-0-00002（三选一）：
    - IPv4/IPv6 → IPV4ADDRESS/IPV6ADDRESS + PORT(默认3868)
    - SCTP → SCTPENDPOINT(引用 ADD SCTPENDPOINT)
  HOSTNAME=reference（对端主机已由 ADD PCRF/ADD OCS/ADD DRA/ADD DIAMETERAAA 之一配置，source_ref 占位 ADD PCRF）。
  范式跨 Gx/Gy/S6b/3GPP AAA/DRA 五类对接一致。notes 投影：最多 510 条；单 PCRF/OCS/DRA 主机≤20 IP 或≤20 SCTP 端点；
  单 AAA 主机≤2 IP 或≤2 SCTP 端点；主机不存在则不可配 → rule 0-00028 cardinality。§6.B 见全局 rule 0-00001。
