notes: |
  UNC atom batch3（2026-07-06），手写自证据包 ADD_DIAMCONNGRP.md（8 特性用，5 参）—— Diameter 族"链路组"容器命令。
  依赖：先 ADD DIAMLOCINFO(本端) + ADD PCRF/OCS/DRA/AAA(对端) + ADD DIAMPEERADDR，再本命令建组，最后 ADD DIAMCONNECTION 建链路。
  LOCALHOSTNAME=reference(ADD DIAMLOCINFO)；PEERHOSTNAME=reference(按 APPLICATION 取 ADD PCRF/ADD OCS/ADD DRA/ADD DIAMETERAAA)。
  APPLICATION 枚举 GX/GY/S6B，须与对端主机应用类型一致。
  SELECTMODE：MASTER_SLAVE=主备，SESSION_ID=按用户粒度负荷分担，ROUND_ROBIN=按消息粒度负荷分担；默认 SESSION_ID。
  notes 投影：最多 1000 条；PEERHOSTNAME≠LOCALHOSTNAME；本端主机多时每组对接一个对端 → rule 0-00029。§6.B 见全局 rule 0-00001。
